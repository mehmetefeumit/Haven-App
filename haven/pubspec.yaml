name: haven
description: Private, forward-secret family location sharing.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  # Localization runtime + GlobalMaterial/Widgets/Cupertino delegates. Ships
  # inside the Flutter SDK (no pub.dev download), so multi-language support via
  # gen-l10n adds zero net-new third-party packages. Pairs with intl (below)
  # and l10n.yaml at the app root.
  flutter_localizations:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  rust_lib_haven:
    path: rust_builder
  geolocator: ^14.0.0
  flutter_foreground_task: ^9.2.2
  # Pinned to 10.0.x: 10.1.0 (released 2026-05-06) is too fresh for a
  # security-critical secure-storage minor bump per our 14-day soak rule.
  # Lift to ^10.1.0 once 10.1.0 has soaked >=14 days (after 2026-05-20).
  flutter_secure_storage: ">=10.0.0 <10.1.0"
  path_provider: ^2.1.0
  # Map dependencies. Stadia Maps is the production tile provider; pin
  # flutter_map >=8.3.0 — 8.3.0 removed the in-package OSMF unblock workaround,
  # so a correct User-Agent is now load-bearing (see constants/tiles.dart).
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  # Direct dep for the certificate-pinned tile HTTP client
  # (lib/src/network/pinned_tile_client.dart). Tracks flutter_map's transitive
  # http; keep the constraint in sync with flutter_map on upgrades.
  http: ^1.6.0
  # QR code scanning. 7.x migrates iOS/macOS from Google MLKit to Apple's
  # Vision framework, which (unlike MLKit) supports the arm64 iOS Simulator —
  # required for the iOS E2E lane on Apple-Silicon runners and for local
  # simulator dev on Apple-Silicon Macs.
  mobile_scanner: ^7.2.0
  # Internationalization
  intl: ^0.20.0
  # Preferences
  shared_preferences: ^2.5.0
  # State management
  flutter_riverpod: ^2.6.1
  qr_flutter: ^4.1.0
  # Iconography
  lucide_icons_flutter: ^3.1.13
  # External links: OSM attribution / "report a map issue" / "support OSM",
  # Stadia legal pages, and the user-initiated "Open in Apple Maps" affordance.
  url_launcher: ^6.3.0
  # Avatar photo picker — picks from the user's gallery.
  # requestFullMetadata:false drops EXIF before the bytes cross the Dart
  # boundary (Rust does its own strip too, but defence in depth).
  # No photo permission is requested: the system pickers (Android Photo
  # Picker / iOS PHPicker) are permission-free and scoped to the chosen
  # image, so permission_handler is intentionally NOT a dependency.
  image_picker: ^1.1.2
  # Direct deps (also pulled transitively by image_picker) so main.dart can
  # opt into the scoped Android Photo Picker via
  # ImagePickerAndroid.useAndroidPhotoPicker. Pinned to the resolved versions.
  image_picker_android: ^0.8.13+17
  image_picker_platform_interface: ^2.11.1
  # Android WorkManager periodic background-wake floor (M7-C).
  # Schedules a ~15-min catch-up sweep that runs only when the FGS is dead.
  # INERT until backgroundCatchupEnabled flips to true (live_sync_provider.dart).
  # Compatible with Dart >=3.5.0 / Flutter >=3.32.0 (we ship Flutter 3.41).
  # NOTE: This adds a COMPILED Android build-surface — the WorkManager Gradle
  # transitive dependency is pulled via workmanager_android. Validate with
  # android-build before merge (transitive AGP/Gradle conflict risk).
  workmanager: ^0.9.0+3
  # Square-locked crop / rotate editor shown AFTER the picker and BEFORE the
  # avatar is set. Native uCrop (Android) / TOCropViewController (iOS) — operates
  # on the picked file, needs no photo permission. Its output is re-run through
  # the Rust pipeline, which strips all metadata and bakes orientation.
  image_cropper: ^12.2.1
  # Direct dep (also transitive) so the crop-flow test can override
  # ImageCropperPlatform.instance with a fake.
  image_cropper_platform_interface: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^8.0.0
  # Drives the static guard in test/lints/initstate_inherited_lookup_test.dart,
  # which parses lib/ and fails if any inherited-widget lookup (X.of(context))
  # can run synchronously during initState() — the bug class that took down the
  # e2e jobs (MapPage crashed on first frame). Already resolved transitively
  # (via very_good_analysis / build_runner); declared here so the test may
  # import package:analyzer directly. Syntactic parse only (no analysis context).
  analyzer: ^10.0.0
  # Generates the platform launcher/store icons from assets/icon/icon.png.
  # Config lives at the bottom of this file; regenerate with
  # `dart run flutter_launcher_icons`.
  flutter_launcher_icons: ^0.14.4
  integration_test:
    sdk: flutter
  ffigen: ^20.1.1
  # Lets the avatar-picker test override ImagePickerPlatform.instance with a
  # fake (MockPlatformInterfaceMixin bypasses the platform-interface token).
  plugin_platform_interface: ^2.1.8
  mockito: ^5.4.0
  build_runner: ^2.4.0
  fake_async: ^1.3.3
  # E2E testing — see docs/E2E_TROUBLESHOOTING.md and tooling/e2e/.
  # patrol_cli is installed globally in CI, not pinned here.
  patrol: ^4.6.0
  patrol_finders: ^3.4.0
  # Lightweight Nostr client used by integration_test/e2e/_lib/test_relay.dart
  # to observe events on the hermetic strfry relay.
  web_socket_channel: ^3.0.0

flutter:
  uses-material-design: true

  # Run gen-l10n on `flutter pub get` / `flutter gen-l10n`, driven by l10n.yaml.
  generate: true

  assets:
    # ODbL licence text shown in the Open-source licenses page.
    - assets/licenses/
    # Pinned Stadia Maps CA bundle for TLS certificate pinning of tile
    # requests in release builds (see lib/src/network/pinned_tile_client.dart).
    - assets/certs/stadia_ca.pem
    # Haven app mark shown in onboarding and the About page. Also the single
    # source for the generated launcher/store icons (flutter_launcher_icons).
    - assets/icon/icon.png

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/InterVariable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMonoVariable.ttf

# ---------------------------------------------------------------------------
# Launcher / store icon generation.
#
# Single source of truth: assets/icon/icon.png (1024x1024, transparent RGBA).
# The Haven mark is black + red, so every tile is flattened onto WHITE to stay
# legible (a dark tile would swallow the black house). Regenerate after editing
# the master with:  dart run flutter_launcher_icons
# Generated outputs (android mipmaps + ios AppIcon set) are committed so release
# builds stay hermetic — see scripts/build_release.sh.
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  # iOS: App Store icons must not contain an alpha channel; remove_alpha_ios
  # flattens the transparent mark onto white.
  ios: true
  remove_alpha_ios: true
  # Android: legacy square icon + adaptive icon (API 26+). The padded
  # foreground keeps the tall mark inside the adaptive safe zone so OEM
  # circle/squircle masks never clip it.
  android: "ic_launcher"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  # icon_mark.png is the master with its white background removed (transparent),
  # so the foreground is just the mark over the white adaptive background. The
  # mark's ~17% margin + the generator's android:inset="16%" (applied by Android
  # at draw time) keep it inside the adaptive safe zone so masks never clip it.
  adaptive_icon_foreground: "assets/icon/icon_mark.png"
  # Android 13+ themed (monochrome) icon. Android uses ONLY this layer's ALPHA
  # channel as a silhouette and tints it to the wallpaper — so it must be the
  # transparent mark (icon_mark.png), NOT the opaque white square (icon.png),
  # which would otherwise render the themed icon as a solid tinted square.
  adaptive_icon_monochrome: "assets/icon/icon_mark.png"
