# Pins the JVM that runs the Gradle daemon for the Android build.
#
# Why this exists:
# - Gradle 8.14 (pinned via gradle/wrapper/gradle-wrapper.properties) bundles a
#   Kotlin compiler that cannot parse JDK 25+ version strings. Running the
#   daemon on JDK 25 crashes Kotlin DSL evaluation with
#   `java.lang.IllegalArgumentException: 25.0.3`, which surfaces as cryptic
#   "cannot find symbol" errors when plugin AARs fail to assemble.
# - JDK 21 is the current LTS, fully supported by Gradle 8.14, AGP 8.11, and
#   Kotlin 2.2/2.3.
#
# How it works:
# - Gradle reads this file before starting the daemon. If no installed JDK
#   matches `toolchainVersion`/`toolchainVendor`, Gradle downloads one using
#   the `toolchainUrl.<OS>.<ARCH>` entries below, caches it in
#   ~/.gradle/jdks/, and uses it for every subsequent build.
# - Note: in Gradle 8.x the foojay-resolver-convention plugin does NOT yet
#   participate in *daemon* JVM provisioning (only project toolchains), so
#   explicit per-platform URLs are required here. Gradle 9.x is expected to
#   close this gap — at that point these `toolchainUrl.*` entries can be
#   replaced with the foojay resolver and the daemon will auto-provision via
#   api.foojay.io like project toolchains do today.
#
# Update procedure:
# - To pull a newer JDK 21 patch release, no action is needed — the
#   `latest/21/ga` Adoptium endpoint always serves the latest GA build.
# - To move to a different LTS (e.g. JDK 25 LTS, expected Sept 2027), bump
#   `toolchainVersion` and update each URL's `/21/` segment. Verify that the
#   Gradle/AGP/Kotlin versions in use support the new JDK before bumping.
toolchainVersion=21
toolchainVendor=ADOPTIUM
toolchainUrl.LINUX.X86_64=https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/eclipse
toolchainUrl.LINUX.AARCH64=https://api.adoptium.net/v3/binary/latest/21/ga/linux/aarch64/jdk/hotspot/normal/eclipse
toolchainUrl.MAC_OS.X86_64=https://api.adoptium.net/v3/binary/latest/21/ga/mac/x64/jdk/hotspot/normal/eclipse
toolchainUrl.MAC_OS.AARCH64=https://api.adoptium.net/v3/binary/latest/21/ga/mac/aarch64/jdk/hotspot/normal/eclipse
toolchainUrl.WINDOWS.X86_64=https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jdk/hotspot/normal/eclipse
