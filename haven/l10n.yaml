# Flutter gen-l10n configuration for Haven.
#
# Official, dependency-minimal localization: flutter_localizations ships inside
# the Flutter SDK and intl is already a dependency, so this adds zero net-new
# third-party packages. Generated sources land in lib/l10n (committed, like the
# FRB bindings) and are regenerated by `flutter gen-l10n` / `flutter pub get`.
#
# See docs/ and the i18n plan: lib/l10n/app_en.arb is the source of truth;
# scripts/ci/check_l10n_parity.sh gates cross-locale consistency in CI.

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-dir: lib/l10n
# (The deprecated synthetic package:flutter_gen is gone in this Flutter; sources
#  are generated into output-dir above and imported via package:haven/l10n/...)

# Every message must carry an @key metadata block (description/placeholders).
# Gives translators context and lets the parity check reason about placeholders.
required-resource-attributes: true

# AppLocalizations.of(context) returns non-null: a missing delegate fails fast
# at the widget boundary instead of silently returning null. Safe because every
# screen renders under the root MaterialApp with the delegate registered, and
# widget tests pump through test/helpers/localized_app_harness.dart.
nullable-getter: false

# Lists messages present in the template but missing from a locale. The CI
# parity gate fails when this file is non-empty.
untranslated-messages-file: build/untranslated.json
