# Zapstore publishing manifest — https://zapstore.dev
#
# `zsp publish` reads this to publish Haven's signed APK to Nostr relays
# (kind 32267/30063/3063 events; icon uploaded to a Blossom server). zsp pulls
# the matching APK from the GitHub Release and distributes Haven's OWN signed APK
# unchanged (it signs only the Nostr events), so Zapstore stays in the same
# signing lineage as the direct-download / Obtainium APKs.
#
# `images:` (screenshots) and `changelog:` are intentionally omitted until those
# files exist — pointing at a missing file makes `zsp publish` fail.

repository: https://github.com/mehmetefeumit/Haven-App

# Whitelisting key. The relay fetches this file from the repo and only accepts
# Haven's release events whose author matches this pubkey. The ZAPSTORE_SIGN_WITH
# CI secret MUST sign with THIS exact key (its nsec1..., or a bunker:// URL whose
# signer is this key). If they differ, the relay silently rejects the events.
pubkey: npub1dc2xa6pj5vgqywcxpjljh2hzyhctss7jf78t58x0ckkq2e5zlmesltwyz0

# Regex selecting the APK asset attached to each GitHub release. The release
# build produces per-ABI split APKs (scripts/build_release.sh apk -> --split-per-abi);
# Zapstore ships the arm64-v8a build (virtually all modern Android phones). If the
# release workflow renames the asset, update this pattern to match.
match: "^app-arm64-v8a-release\\.apk$"

summary: Private, forward-secret location sharing — no accounts, no tracking.

description: |
    **Note:** Haven is in active development. This release may contain bugs or
    incomplete features, and behavior could change between versions. Please report
    any issues you run into so they can be fixed.

    Haven is an end-to-end encrypted location sharing app that requires no
    personal information and uses no central server. Your location is encrypted
    on your device before it leaves, and Haven runs no servers of its own, so
    there's simply no data to sell, leak, or hand over. It is built on the
    decentralized Nostr network, and requires no phone numbers, emails, or any
    personally identifiable information before you can start using it. Haven is
    open-source, so all of its privacy guarantees are verifiable.

    **Why use Haven?**

    Most technology companies we trust our most personal information with have
    not proven their interest in keeping our data secure and private. Instead,
    our data is commodified: even entities which we do not directly interact
    with buy and sell it to build a profile of who we are, where we go, and what
    we care about the most.

    Haven believes that privacy is a fundamental human right. Your location
    data — where you work, meet loved ones, learn about the world, and discover
    yourself — is yours, and no one should profit from it. If you want and need
    to share your location with people you trust, no one should take advantage
    of it.

    In a world of platforms looking for all of the data points they can learn
    of you, Haven is an open-source app with a single motivation: providing the
    most private and permissionless way of sharing your location with the people
    you care about. It will never require personal information, never sacrifice
    user privacy, and never exploit one of your most personal pieces of
    information — your location.

    For more information about Haven and the technologies/protocols related to
    it, see below:

    - Haven Source Code: https://github.com/mehmetefeumit/Haven-App
    - Nostr Protocol: https://nostr.org/
    - Marmot Protocol: https://github.com/marmot-protocol/marmot

