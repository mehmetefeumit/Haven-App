# Zapstore publishing manifest — https://zapstore.dev
#
# `zsp publish` reads this to publish Haven's signed APK to Nostr relays
# (kind 32267/30063/3063 events; icon uploaded to a Blossom server). zsp pulls
# the matching APK from the GitHub Release and distributes Haven's OWN signed APK
# unchanged (it signs only the Nostr events), so Zapstore stays in the same
# signing lineage as the direct-download / Obtainium APKs.
#
# `images:` (screenshots) and `changelog:` are intentionally omitted until those
# files exist — pointing at a missing file makes `zsp publish` fail.

repository: https://github.com/mehmetefeumit/Haven-App

# Whitelisting key. The relay fetches this file from the repo and only accepts
# Haven's release events whose author matches this pubkey. The ZAPSTORE_SIGN_WITH
# CI secret MUST sign with THIS exact key (its nsec1..., or a bunker:// URL whose
# signer is this key). If they differ, the relay silently rejects the events.
pubkey: npub1dc2xa6pj5vgqywcxpjljh2hzyhctss7jf78t58x0ckkq2e5zlmesltwyz0

# Regex selecting the APK asset attached to each GitHub release. The release
# build produces per-ABI split APKs (scripts/build_release.sh apk -> --split-per-abi);
# Zapstore ships the arm64-v8a build (virtually all modern Android phones). If the
# release workflow renames the asset, update this pattern to match.
match: "^app-arm64-v8a-release\\.apk$"

summary: Private, forward-secret location sharing — no accounts, no tracking.

description: |
    **Haven — private, unstoppable location sharing.**

    Haven shares your location only with the circles you choose, end-to-end
    encrypted on your device before it ever leaves. It is built on the
    decentralized Nostr network with the Marmot protocol (MLS), so there is no
    account, no phone number, and no central server to censor, hack, or shut
    down.

    - Encrypted by design: only the circle members you choose can decrypt your
      location.
    - No tracking: no ad trackers, no analytics — your location is never sold or
      shared.
    - Decentralized: runs over Nostr relays with no single point of failure.
    - Open source: publicly auditable, no backdoors.

tags:
    - privacy
    - security
    - location
    - nostr
    - MLS
    - E2EE
    - freedom-tech

license: MIT

# 512x512 PNG shown on the Zapstore listing (committed, must exist or zsp fails).
icon: fastlane/metadata/android/en-US/images/icon.png

metadata_sources:
    - github
