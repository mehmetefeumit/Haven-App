# E2E flakiness monitor.
#
# Runs weekly. Queries the GitHub Actions API for the last 30 days of
# e2e-android workflow runs, tallies pass/fail per scenario job, and
# emits a markdown report to the workflow run's summary panel (visible
# at https://github.com/<owner>/<repo>/actions/runs/<id>).
#
# The 1% flakiness target from the plan is the headline metric:
# anything above warrants action (a flaky scenario erodes developer
# trust in the gate). Cron schedule mirrors audit.yml's weekly run.
#
# Reads only — no writes to branches, no PR comments, no third-party
# services. Uses the workflow's default GITHUB_TOKEN with read-only
# scopes.

name: E2E Flakiness Monitor

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays, 06:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  report:
    name: Aggregate last-30-day pass rate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # GitHub CLI honors this automatically — no extra setup needed
      # on the ubuntu-latest image.
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Aggregate workflow runs
        run: |
          set -euo pipefail

          # Window: last 30 days. Date math is GNU-coreutils; the
          # ubuntu-latest image ships these by default.
          since="$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          echo "Aggregating e2e-android runs since: ${since}"

          # IMPORTANT: `gh run list --json` does NOT expose a `jobs`
          # field — that's only available on `gh run view <id> --json
          # jobs`. So we fetch run IDs first, then walk each run for
          # its per-job conclusions. This costs one extra API call per
          # run but stays well under the 5000-req/hour token quota
          # (a busy week sees <100 runs).
          run_ids="$(gh run list \
            --workflow=e2e-android.yml \
            --limit 500 \
            --json databaseId,createdAt \
            --jq "[.[] | select(.createdAt > \"${since}\") | .databaseId]")"

          total_runs="$(echo "${run_ids}" | jq 'length')"
          echo "Found ${total_runs} runs in window"

          if [[ "${total_runs}" -eq 0 ]]; then
            {
              echo "## E2E Flakiness Report"
              echo ""
              echo "_No e2e-android runs in the last 30 days. Either the_"
              echo "_workflow is paused or no PRs/pushes touched main._"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          # Walk each run, pull its job-level conclusions, and merge
          # into a flat array of {name, conclusion} pairs.
          all_jobs="[]"
          while IFS= read -r run_id; do
            jobs_for_run="$(gh run view "${run_id}" --json jobs \
              --jq '[.jobs[] | {name: .name, conclusion: .conclusion}]' \
              2>/dev/null || echo "[]")"
            all_jobs="$(jq -n \
              --argjson a "${all_jobs}" \
              --argjson b "${jobs_for_run}" \
              '$a + $b')"
          done < <(echo "${run_ids}" | jq -r '.[]')

          total_job_records="$(echo "${all_jobs}" | jq 'length')"
          echo "Aggregated ${total_job_records} job records across ${total_runs} runs"

          # Single row for the consolidated `e2e_android` job (the
          # five `scenario_*` jobs and the `ghost_admin_safety_net`
          # job were folded into one when the test scenarios were
          # consolidated into `e2e_combined.dart`). Historical rows
          # for the legacy job names are kept so runs from before the
          # consolidation still surface in long-window reports —
          # they will report 0/0 once the window passes the
          # consolidation date, which the "—" status path handles
          # gracefully.
          declare -a scenarios=(
            "e2e_android"
            "scenario_01_identity_and_circle"
            "scenario_02_invitation_accept"
            "scenario_03_location_sharing"
            "scenario_04_non_admin_leave"
            "scenario_05_admin_leave_ghost"
            "ghost_admin_safety_net"
          )

          {
            echo "## E2E Flakiness Report"
            echo ""
            echo "Window: last 30 days (since \`${since}\`)"
            echo "Total e2e-android workflow runs: **${total_runs}**"
            echo "Total per-scenario job records: **${total_job_records}**"
            echo ""
            echo "| Scenario | Total | Failed | Fail Rate | Status |"
            echo "|---|---|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"

          overall_status="ok"

          for scenario in "${scenarios[@]}"; do
            scenario_total="$(echo "${all_jobs}" \
              | jq "[.[] | select(.name == \"${scenario}\")] | length")"
            scenario_failed="$(echo "${all_jobs}" \
              | jq "[.[] | select(.name == \"${scenario}\") | select(.conclusion == \"failure\")] | length")"

            if [[ "${scenario_total}" -eq 0 ]]; then
              status="—"
              fail_pct="—"
            else
              # Floating-point arithmetic via awk (bash lacks it natively).
              fail_pct="$(awk -v f="${scenario_failed}" -v t="${scenario_total}" \
                'BEGIN { printf "%.2f", (f/t)*100 }')"
              # 1% is the plan-specified target; above flags as warning.
              over_target="$(awk -v p="${fail_pct}" 'BEGIN { print (p > 1) ? "1" : "0" }')"
              if [[ "${over_target}" == "1" ]]; then
                status="⚠️ above 1% target"
                overall_status="degraded"
              else
                status="✅"
              fi
              fail_pct="${fail_pct}%"
            fi

            echo "| \`${scenario}\` | ${scenario_total} | ${scenario_failed} | ${fail_pct} | ${status} |" \
              >> "${GITHUB_STEP_SUMMARY}"
          done

          {
            echo ""
            echo "**Overall status:** ${overall_status}"
            echo ""
            echo "Plan target: \`≤1%\` per scenario (see"
            echo "\`~/.claude/plans/one-of-the-most-dapper-crescent.md\`)."
            echo "Anything above warrants triage — see"
            echo "\`docs/E2E_TROUBLESHOOTING.md\` for the playbook."
          } >> "${GITHUB_STEP_SUMMARY}"

          # Also dump the raw aggregation as an artifact so the report
          # is consumable by downstream tools (badge generators,
          # spreadsheet imports, etc.).
          mkdir -p out
          echo "${run_ids}" > out/run_ids.json
          echo "${all_jobs}" > out/all_jobs.json
          {
            for scenario in "${scenarios[@]}"; do
              scenario_total="$(echo "${all_jobs}" \
                | jq "[.[] | select(.name == \"${scenario}\")] | length")"
              scenario_failed="$(echo "${all_jobs}" \
                | jq "[.[] | select(.name == \"${scenario}\") | select(.conclusion == \"failure\")] | length")"
              printf '%s\t%s\t%s\n' \
                "${scenario}" "${scenario_total}" "${scenario_failed}"
            done
          } > out/summary.tsv

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-flakiness-${{ github.run_id }}
          path: out/
          retention-days: 90
          if-no-files-found: ignore
