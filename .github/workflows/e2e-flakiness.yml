# E2E flakiness monitor.
#
# Runs weekly. Queries the GitHub Actions API for the last 30 days of E2E lane
# executions, tallies pass/fail per lane, and emits a markdown report to the
# workflow run's summary panel.
#
# # Where the lane executions live
#
# Every E2E lane is a REUSABLE (`on: workflow_call`) workflow, and reusable
# executions belong to the CALLER's run — a call-only workflow has no runs of
# its own (`gh run list --workflow=e2e-android.yml` is always empty). So this
# monitor queries the two run-generating callers:
#
#   * ci.yml                   — push runs on main only. PR runs are excluded
#                                on purpose: a red PR is usually a genuinely
#                                broken change, not flakiness, and would
#                                drown the signal.
#   * e2e-nightly.yml          — the scheduled safety-net re-runs.
#   * e2e-flakiness-stress.yml — the nightly N-iteration stress loop (its
#                                `flake_stress` job fails on ANY iteration
#                                failing, so it reports as its own row).
#
# In those runs, a reusable lane's job is named
# "<caller job name> / <inner job name>" (e.g. "E2E Core Flow (Android) /
# e2e_android"), so records are grouped by FULL job name — one row per lane
# variant (poll vs live-sync callers stay separate). Rows are matched on the
# inner job id (e2e_* — plus the legacy scenario_*/ghost_admin names from
# before the e2e_combined consolidation, so long-window reports spanning old
# runs still surface them). NOTE: a renamed lane (e.g. e2e_m7_background →
# e2e_background_catchup) appears as two rows in a window spanning the rename.
#
# # What counts as an attempt
#
# Only job conclusions `success` and `failure` enter the denominator.
# `cancelled` (ci.yml auto-cancels superseded runs) and `skipped` records are
# neither passes nor failures and would silently deflate the fail rate.
#
# The 1% flakiness target from the E2E plan is the headline metric: anything
# above warrants action (a flaky lane erodes trust in the gate). Cron mirrors
# audit.yml's weekly run.
#
# Reads only — no writes to branches, no PR comments, no third-party
# services. Uses the workflow's default GITHUB_TOKEN with read-only scopes.

name: E2E Flakiness Monitor

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays, 06:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  report:
    name: Aggregate last-30-day pass rate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # GitHub CLI honors this automatically — no extra setup needed
      # on the ubuntu-latest image.
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Aggregate workflow runs
        run: |
          set -euo pipefail

          # Window: last 30 days. Date math is GNU-coreutils; the
          # ubuntu-latest image ships these by default.
          since="$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          echo "Aggregating E2E lane executions since: ${since}"

          # IMPORTANT: `gh run list --json` does NOT expose a `jobs` field —
          # that's only available on `gh run view <id> --json jobs`. So we
          # fetch run IDs first, then walk each run for its per-job
          # conclusions. This costs one extra API call per run but stays well
          # under the 5000-req/hour token quota (a busy month sees a few
          # hundred runs).
          ci_run_ids="$(gh run list \
            --workflow=ci.yml \
            --branch main \
            --event push \
            --limit 500 \
            --json databaseId,createdAt \
            --jq "[.[] | select(.createdAt > \"${since}\") | .databaseId]")"

          nightly_run_ids="$(gh run list \
            --workflow=e2e-nightly.yml \
            --limit 500 \
            --json databaseId,createdAt \
            --jq "[.[] | select(.createdAt > \"${since}\") | .databaseId]")"

          stress_run_ids="$(gh run list \
            --workflow=e2e-flakiness-stress.yml \
            --limit 500 \
            --json databaseId,createdAt \
            --jq "[.[] | select(.createdAt > \"${since}\") | .databaseId]")"

          run_ids="$(jq -n \
            --argjson a "${ci_run_ids}" \
            --argjson b "${nightly_run_ids}" \
            --argjson c "${stress_run_ids}" \
            '$a + $b + $c')"

          total_runs="$(echo "${run_ids}" | jq 'length')"
          echo "Found ${total_runs} runs in window (ci.yml main pushes + nightly + stress)"

          if [[ "${total_runs}" -eq 0 ]]; then
            {
              echo "## E2E Flakiness Report"
              echo ""
              echo "_No ci.yml (main push), e2e-nightly, or flake-stress runs_"
              echo "_in the last 30 days. Either the workflows are paused or_"
              echo "_nothing landed._"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          # Walk each run, pull its job-level conclusions, and merge into a
          # flat array of {name, conclusion} pairs. Keep ONLY E2E lane jobs —
          # matched on the inner (post-"/ ") job id: the current e2e_* ids
          # plus the legacy per-scenario ids from before the e2e_combined
          # consolidation. Keep ONLY decided attempts (success/failure):
          # cancelled/skipped records are neither passes nor failures.
          all_jobs="[]"
          while IFS= read -r run_id; do
            jobs_for_run="$(gh run view "${run_id}" --json jobs \
              --jq '[.jobs[]
                     | {name: .name, conclusion: .conclusion}
                     | select(.name | test("(^| / )(e2e_|scenario_[0-9]|ghost_admin_safety_net|flake_stress)"))
                     | select(.conclusion == "success" or .conclusion == "failure")]' \
              2>/dev/null || echo "[]")"
            all_jobs="$(jq -n \
              --argjson a "${all_jobs}" \
              --argjson b "${jobs_for_run}" \
              '$a + $b')"
          done < <(echo "${run_ids}" | jq -r '.[]')

          total_job_records="$(echo "${all_jobs}" | jq 'length')"
          echo "Aggregated ${total_job_records} decided lane records across ${total_runs} runs"

          # One row per distinct full job name ("<caller job> / <inner job>"),
          # so lane variants (poll vs live-sync) report separately.
          lane_names="$(echo "${all_jobs}" | jq -r '[.[].name] | unique | .[]')"

          {
            echo "## E2E Flakiness Report"
            echo ""
            echo "Window: last 30 days (since \`${since}\`)"
            echo "Runs scanned (ci.yml main pushes + e2e-nightly + flake-stress): **${total_runs}**"
            echo "Decided lane records (success/failure only): **${total_job_records}**"
            echo ""
            echo "| Lane | Attempts | Failed | Fail Rate | Status |"
            echo "|---|---|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"

          overall_status="ok"

          while IFS= read -r lane; do
            [[ -z "${lane}" ]] && continue
            lane_total="$(echo "${all_jobs}" \
              | jq --arg n "${lane}" '[.[] | select(.name == $n)] | length')"
            lane_failed="$(echo "${all_jobs}" \
              | jq --arg n "${lane}" '[.[] | select(.name == $n) | select(.conclusion == "failure")] | length')"

            # Floating-point arithmetic via awk (bash lacks it natively).
            fail_pct="$(awk -v f="${lane_failed}" -v t="${lane_total}" \
              'BEGIN { printf "%.2f", (f/t)*100 }')"
            # 1% is the plan-specified target; above flags as warning.
            over_target="$(awk -v p="${fail_pct}" 'BEGIN { print (p > 1) ? "1" : "0" }')"
            if [[ "${over_target}" == "1" ]]; then
              status="⚠️ above 1% target"
              overall_status="degraded"
            else
              status="✅"
            fi

            echo "| \`${lane}\` | ${lane_total} | ${lane_failed} | ${fail_pct}% | ${status} |" \
              >> "${GITHUB_STEP_SUMMARY}"
          done <<< "${lane_names}"

          {
            echo ""
            echo "**Overall status:** ${overall_status}"
            echo ""
            echo "Target: \`≤1%\` fail rate per lane. Anything above warrants"
            echo "triage — see \`docs/E2E_TROUBLESHOOTING.md\` for the playbook."
          } >> "${GITHUB_STEP_SUMMARY}"

          # Also dump the raw aggregation as an artifact so the report is
          # consumable by downstream tools (badge generators, spreadsheet
          # imports, etc.).
          mkdir -p out
          echo "${run_ids}" > out/run_ids.json
          echo "${all_jobs}" > out/all_jobs.json
          {
            while IFS= read -r lane; do
              [[ -z "${lane}" ]] && continue
              lane_total="$(echo "${all_jobs}" \
                | jq --arg n "${lane}" '[.[] | select(.name == $n)] | length')"
              lane_failed="$(echo "${all_jobs}" \
                | jq --arg n "${lane}" '[.[] | select(.name == $n) | select(.conclusion == "failure")] | length')"
              printf '%s\t%s\t%s\n' \
                "${lane}" "${lane_total}" "${lane_failed}"
            done <<< "${lane_names}"
          } > out/summary.tsv

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-flakiness-${{ github.run_id }}
          path: out/
          retention-days: 90
          if-no-files-found: ignore
