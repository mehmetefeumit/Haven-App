# Reusable workflow: debug-build verification.
#
# Proves the app builds end-to-end with the Rust core on every mobile target.
# These are build proofs only (no tests): they catch Gradle/Xcode/cargokit/FFI
# wiring breaks that the unit-test lanes cannot see.
#
#   - Android: one job per ABI (arm64, arm, x64). Each architecture gets its
#     own runner because a combined multi-ABI build has exhausted a default
#     runner's disk.
#   - iOS: debug build, no codesign.

name: Build Check

on:
  workflow_call:

jobs:
  android:
    name: Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      # One architecture failing must not cancel the other two — each arch is
      # an independent signal.
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust-target: aarch64-linux-android
            flutter-platform: android-arm64
          - arch: arm
            rust-target: armv7-linux-androideabi
            flutter-platform: android-arm
          - arch: x64
            rust-target: x86_64-linux-android
            flutter-platform: android-x64
    defaults:
      run:
        working-directory: haven

    steps:
      # Runs BEFORE checkout (the job-default `haven` working directory does
      # not exist yet), reclaiming the disk the multi-GB debug build needs.
      - name: Free disk space
        working-directory: /
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/lib/android/sdk/system-images

      - name: Checkout
        uses: actions/checkout@v6

      # Must match toolchainVersion in haven/android/gradle/gradle-daemon-jvm.properties.
      # If they diverge, Gradle re-downloads JDK 21 (~200 MB) on every CI run.
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: android-${{ matrix.arch }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (${{ matrix.arch }})
        run: flutter build apk --debug --target-platform ${{ matrix.flutter-platform }}

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-${{ matrix.arch }}
          path: haven/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  ios:
    name: iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: haven

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --debug --no-codesign
