# Reusable workflow: M7-C/D native background-wake structural guard.
#
# Fails the build if any of the static correctness invariants of the Android
# WorkManager + iOS SLC/BGTask background wakes regress — specifically the three
# bugs that sank the 2026-07-02 native-wake draft (missing DartPluginRegistrant
# ordering, a tools:node="replace" strip of the RebootReceiver intent-filter, a
# weakly-captured iOS FlutterMethodChannel) plus the M7-D review findings
# (BGTask identifier parity, the SLC/BGTask teardown-channel collision, the
# iOS-safe WorkManager registration gate, and the wake-path intent re-check).
#
# Pure source grep/awk via scripts/ci/check_m7_native_wake_guards.sh — no
# Flutter/Gradle/Xcode toolchain, so it is fast and independent of the build and
# emulator/simulator lanes. The runtime safety proofs (writer-exclusion TOCTOU,
# no-network-after-disable) are the SEPARATE M7-E emulator lanes; this guard
# covers only what a static check can prove.

name: M7 Native Wake Guard

on:
  workflow_call:

jobs:
  m7-native-wake-guard:
    name: M7 Native Wake Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # xmllint (libxml2-utils) is pre-installed on ubuntu-latest, but ensure it
      # so the XML-comment-safe manifest/plist checks never depend on the image.
      - name: Ensure xmllint
        run: xmllint --version >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Check M7-C/D native-wake structural invariants
        run: bash scripts/ci/check_m7_native_wake_guards.sh
