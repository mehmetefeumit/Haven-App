# Reusable workflow: Android non-E2E integration-test lane (backlog CI-4).
#
# Drives the five Flutter integration tests under haven/integration_test/
# that are NOT part of the consolidated functional flow
# (`e2e_combined.dart`, owned by e2e-android.yml). Before this lane
# existed they ran NOWHERE in CI — present in the tree, green by
# default, never executed ("orphans"). This job runs each of them on a
# single AVD against a fresh hermetic strfry relay so they become a real
# signal. A fast smoke pre-flight (e2e/smoke_test.dart) runs FIRST so a
# broken bridge / keyring / relay fails in ~30s before the heavier targets.
#
#   integration_test/e2e/smoke_test.dart        (fast pre-flight, runs first)
#   integration_test/app_test.dart
#   integration_test/keyring_test.dart
#   integration_test/encryption_pipeline_test.dart
#   integration_test/circle_service_remove_member_test.dart
#   integration_test/circle_admin_leave_ghost_test.dart
#
# # Honest skips, not failures
#
# Several of these construct CircleManagerFfi, which calls
# init_keyring_store(). The harness installs the in-memory keyring
# (useInMemoryKeyringForTest) where it can; any test that still cannot
# obtain a keyring on the headless AVD calls markTestSkipped(...). A
# skip is reported as a SKIP by the Flutter reporter and does NOT fail
# the build. This lane fails only on a genuine assertion failure /
# driver error.
#
# # Architecture mirrors e2e-android.yml
#
# Same single-AVD, build-before-boot design as the e2e_android job (the
# multi-GB Rust-NDK + Gradle build peak must never coincide with a
# resident emulator — the historical lost-runner cause; see
# docs/E2E_TROUBLESHOOTING.md). All six target APKs are built in a
# dedicated step BEFORE the emulator boots and staged under
# /tmp/integration-apks/; the on-emulator step then only installs +
# grants + drives, one target at a time, via
# run-integration-tests.sh, which resets the relay between targets.
#
# The e2e_android job is intentionally left untouched: this is a
# SEPARATE workflow_call workflow so the proven functional gate carries
# zero risk from this addition.

name: E2E Integration Tests

on:
  workflow_call:

jobs:
  e2e_integration:
    name: e2e_integration
    runs-on: ubuntu-latest
    # Six targets (smoke pre-flight + five), each: relay reset + install
    # + grant + drive. Each individual target is far cheaper than the full
    # e2e_combined flow (no 5-phase scenario), but six of them plus per-target relay
    # resets add up — 45 minutes is a comfortable envelope. The
    # per-target drive is bounded by the emulator step's own
    # timeout-minutes below.
    timeout-minutes: 45
    env:
      HAVEN_E2E_RELAY: ws://10.0.2.2:7777
      FLUTTER_SUPPRESS_ANALYTICS: "true"

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          # Distinct cache key from the e2e_android job so the two jobs
          # don't race on the same cache entry; both build the same
          # x86_64-linux-android target so the savings are equivalent.
          key: e2e-integration-x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: haven
        run: flutter pub get

      # Build ALL SIX target APKs (smoke pre-flight + five) BEFORE the emulator boots, for the
      # same reason e2e-android builds e2e_combined up front: the
      # Rust-NDK + Gradle peak must not coincide with a resident
      # emulator. Each target is a separate --target build (the Rust
      # .so is cached after the first, so subsequent builds are mostly
      # Dart/Gradle). Staged under /tmp/integration-apks/<slug>.apk;
      # run-integration-tests.sh copies each into place before driving.
      #
      # The --dart-define baked here MUST match the relay URL the
      # emulator step uses (the value is compiled into the APK; the
      # drive step does not re-pass it) — identical contract to
      # e2e-android.yml.
      - name: Build integration test APKs
        working-directory: haven
        # Bounds a hung/stalled build so it fails fast rather than
        # burning toward the job timeout — symmetric with the build
        # bound in e2e-android.yml. Six builds need more than one.
        timeout-minutes: 40
        run: bash ../tooling/e2e/ci/build-integration-apks.sh

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Shared with e2e-android.yml on purpose: the AVD snapshot is
          # byte-identical (same api/arch/target/profile), so this lane
          # restores the snapshot e2e_android created instead of
          # rebuilding it. Cache writes are first-writer-wins; a
          # concurrent miss in both jobs just means one save is a no-op.
          key: avd-api34-x86_64-google_apis-single-v1

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Start strfry relay
        env:
          # Same immutable digest pin as e2e-android.yml; the
          # STRFRY_IMAGE repo variable wins when set. run-integration-
          # tests.sh resets the relay PER TARGET, but starting it here
          # first surfaces an image-pull/startup failure as a clean
          # step failure before the emulator boots.
          STRFRY_IMAGE: ${{ vars.STRFRY_IMAGE || 'dockurr/strfry@sha256:545555da5dd2c2b502f2c0d159f4dc4996d0e488e3bf25905ce881722d63d2c5' }}
        run: bash tooling/e2e/ci/start-strfry.sh

      # Install + grant + drive each target, ONE at a time, with a
      # fresh relay per target. The APKs were built in the pre-emulator
      # step, so no Gradle runs here and the emulator is the dominant
      # memory consumer.
      #
      # STRFRY_IMAGE is forwarded so the per-target relay resets inside
      # run-integration-tests.sh pull the same pinned image.
      #
      # timeout-minutes: 35 bounds a hung drive across all six targets
      # so GitHub kills THIS step (not the runner), letting the
      # if: always() / if: failure() diagnostic + artifact steps run.
      - name: Run integration tests on the emulator
        timeout-minutes: 35
        uses: reactivecircus/android-emulator-runner@v2
        env:
          STRFRY_IMAGE: ${{ vars.STRFRY_IMAGE || 'dockurr/strfry@sha256:545555da5dd2c2b502f2c0d159f4dc4996d0e488e3bf25905ce881722d63d2c5' }}
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Single bash invocation — the action runs each line of a
          # multi-line script: in its own sh -c, which would drop the
          # loop's shell state. All real logic is in the checked-in
          # script.
          script: bash tooling/e2e/ci/run-integration-tests.sh integration_test/e2e/smoke_test.dart=/tmp/integration-apks/smoke_test.apk integration_test/app_test.dart=/tmp/integration-apks/app_test.apk integration_test/keyring_test.dart=/tmp/integration-apks/keyring_test.apk integration_test/encryption_pipeline_test.dart=/tmp/integration-apks/encryption_pipeline_test.apk integration_test/circle_service_remove_member_test.dart=/tmp/integration-apks/circle_service_remove_member_test.apk integration_test/circle_admin_leave_ghost_test.dart=/tmp/integration-apks/circle_admin_leave_ghost_test.apk

      - name: Collect strfry logs
        if: always()
        run: |
          docker logs strfry > /tmp/strfry.log 2>&1 || true

      - name: Capture host + emulator diagnostics
        if: failure()
        run: |
          {
            echo "=== df -h ==="
            df -h || true
            echo
            echo "=== free -h ==="
            free -h || true
            echo
            echo "=== adb devices -l ==="
            adb devices -l || true
            echo
            echo "=== adb shell dumpsys meminfo com.oblivioustech.haven ==="
            adb shell dumpsys meminfo com.oblivioustech.haven || true
            echo
            echo "=== top (1 sample) ==="
            top -bn1 | head -40 || true
          } > /tmp/diag.txt 2>&1

      # Upload per-target logs (run-integration-tests.sh copies each
      # target's logcat + drive log under /tmp/integration-logs/ so one
      # target can't clobber another's evidence) plus the shared
      # diagnostics. if: always() so a green run still surfaces skips.
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-integration-${{ github.run_id }}
          path: |
            /tmp/integration-logs/
            /tmp/strfry.log
            /tmp/diag.txt
          retention-days: 14
          if-no-files-found: ignore

      # Relay teardown — runs LAST and if: always() so the strfry
      # container + its host data dir are removed on every outcome,
      # after the log-collection step has read the container. Best-
      # effort (always exits 0), so teardown can't turn a green run red.
      - name: Tear down strfry relay
        if: always()
        run: bash tooling/e2e/ci/stop-strfry.sh
