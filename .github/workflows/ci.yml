# Main CI orchestrator
# Add new jobs by creating reusable workflows and calling them here

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check
    uses: ./.github/workflows/rust-check.yml

  cross-check:
    name: Cross Check
    uses: ./.github/workflows/cross-check.yml

  coverage:
    name: Coverage
    uses: ./.github/workflows/coverage.yml

  audit:
    name: Dependency Audit
    uses: ./.github/workflows/audit.yml

  # Tile-provider guard: ensures the raw OpenStreetMap endpoint never becomes
  # the released default tile source (OSMF tile usage policy). Pure grep, runs
  # in parallel with everything else.
  tile-provider-check:
    name: Tile Provider Check
    uses: ./.github/workflows/tile-provider-check.yml

  # Secret guard: fails the build if the Stadia Maps API key (or any
  # UUID-shaped secret) is committed, if the gitignored secrets.json becomes
  # tracked, or if tiles.dart stops injecting the key at compile time. Pure
  # grep, runs in parallel with everything else.
  secrets-check:
    name: No Committed Secrets
    uses: ./.github/workflows/check-no-committed-secrets.yml

  # Avatar privacy guard: avatars are E2E-encrypted and shared INLINE over MLS
  # only — they must never be fetched/uploaded via a relay, CDN, Blossom, or a
  # public kind-0 profile. Fails on Image.network under haven/lib or any
  # kind-0/Blossom/imeta/HTTP avatar surface in the avatar code paths. Pure
  # grep, runs in parallel with everything else.
  avatar-privacy-guard:
    name: Avatar Privacy Guard
    uses: ./.github/workflows/avatar-privacy-guard.yml

  # Android INTERNET-permission regression guard (M7-8): the relay receive
  # path (live-sync engine + M7 background catch-up) requires INTERNET; a
  # release stripped of it ships silently broken. Pure grep, runs in parallel.
  internet-permission-guard:
    name: Internet Permission Guard
    uses: ./.github/workflows/internet-permission-check.yml

  # M7-C/D native background-wake structural guard (M7-E): locks the static
  # correctness invariants of the Android WorkManager + iOS SLC/BGTask wakes so
  # the three reverted-draft bugs (DartPluginRegistrant order, RebootReceiver
  # intent-filter strip, weak iOS channel) and the M7-D review findings (BGTask
  # identifier parity, teardown-channel collision, iOS-safe registration gate,
  # intent re-check) cannot silently regress. Pure grep, runs in parallel.
  m7-native-wake-guard:
    name: M7 Native Wake Guard
    uses: ./.github/workflows/m7-native-wake-check.yml

  # E2E harness self-tests: gates the pure-bash guards embedded in the E2E
  # tooling so they can't silently rot. Validates is_connect_flake (the
  # connect-phase-flake retry predicate — a real test failure or hang is never
  # retried, so a bug can't be masked) and the Security Rule #6 secret-leak
  # guard. Pure bash + grep, no toolchain/emulator, runs in parallel.
  e2e-harness-selftest:
    name: E2E Harness Self-Tests
    uses: ./.github/workflows/e2e-harness-selftest.yml

  # Localization gate: the locale stays a local-only preference (never reaches
  # a relay), every shipped language is fully translated, the committed gen-l10n
  # sources match the ARBs, and all locales agree on keys/placeholders/ICU
  # plural categories. Deterministic and dependency-minimal; the AI translation
  # review (l10n-ai-review.yml) is a separate, advisory, PR-only layer.
  l10n-check:
    name: L10n Check
    uses: ./.github/workflows/l10n-check.yml

  # Functional E2E gate (Phase 1): boots a hermetic strfry relay and an
  # Android emulator, runs the onboarding + circle-creation scenario, and
  # asserts both the UI state and the kind-1059 gift-wrap landing on the
  # relay. Required from PR #1 per the E2E pipeline plan.
  #
  # `needs: [rust-check]` (and intentionally NOT `coverage`) because E2E
  # is a functional signal, not a coverage signal; gating it on coverage
  # would couple unrelated checks.
  e2e-android:
    name: E2E Android
    needs: [rust-check]
    uses: ./.github/workflows/e2e-android.yml
    # PR gate runs the POLL path (live_sync defaults false). The M11 live-sync
    # scenarios self-skip here; they run flag-on in the on-demand `e2e-live-sync`
    # workflow. Promote to `with: live_sync: true` only once that path is proven
    # green end-to-end (prove-then-gate — a flag-on build also runs the poll-path
    # FE-1/FE-2 scenarios flag-on, which is not yet validated).

  # iOS counterpart of e2e-android: runs the SAME e2e_combined scenario on a
  # booted iOS simulator (real iOS UI + in-process synthetic peers) against a
  # host-native relay (macOS runners have no Docker). Gives per-PR coverage of
  # the iOS foreground send/receive/MLS path. Runs in PARALLEL with e2e-android
  # (both gated only on rust-check), so PR wall-clock is bounded by the slower
  # of the two, not their sum. NOTE: a simulator cannot reproduce real-device
  # background suspension — that class needs a real device, out of scope for
  # GitHub-hosted runners.
  e2e-ios:
    name: E2E iOS
    needs: [rust-check]
    uses: ./.github/workflows/e2e-ios.yml

  # Non-E2E integration-test lane (CI-4): runs the five formerly-orphan
  # Flutter integration tests (haven/integration_test/*.dart) that the
  # consolidated e2e_combined flow does NOT cover. Runs in PARALLEL with
  # e2e-android (both gated only on rust-check, neither `needs:` the
  # other), so wiring these in does not serialize behind the functional
  # gate — PR wall-clock is bounded by the slower of the two, not their
  # sum (keeps PRs fast per CI-6). The genuinely heavy lane — the flake
  # stress loop — is deliberately NOT here; it runs nightly/on-demand
  # via e2e-flakiness-stress.yml.
  e2e-integration:
    name: E2E Integration Tests
    needs: [rust-check]
    uses: ./.github/workflows/e2e-integration.yml

  # Relay-customization lane: drives the two relay-customization
  # integration tests against TWO hermetic strfry relays (a default
  # relay R1 and a DISTINCT custom relay R2) to prove that customizing
  # the relay set is actually honored — a single relay can't tell
  # "published to custom" from "published to default". Runs in PARALLEL
  # with e2e-android and e2e-integration (all three gated only on
  # rust-check, none `needs:` the others), so it doesn't serialize PR
  # wall-clock behind the other E2E lanes.
  e2e-relay-customization:
    name: E2E Relay Customization
    needs: [rust-check]
    uses: ./.github/workflows/e2e-relay-customization.yml

  # M7-E background catch-up runtime-proof lane: boots the worker's background
  # isolate COLD on an AVD (RustLib + real platform keyring + SQLCipher + the
  # app's circle DB), force-runs the WorkManager job across four phases
  # (bootstrap, reboot re-arm, pending-wipe no-op, consent-disabled no-op), and
  # asserts the runtime invariants the unit tests + static guard cannot reach.
  # Runs in PARALLEL with the other E2E lanes (all gated only on rust-check,
  # none `needs:` the others), so it does not serialize PR wall-clock. The
  # orchestrator self-guards on backgroundCatchupEnabled=true and fails loudly
  # if the flag is rolled back without removing this entry (plan §7).
  e2e-m7-background:
    name: E2E M7 Background Catch-up
    needs: [rust-check]
    uses: ./.github/workflows/e2e-m7-background.yml

  android-build:
    name: Android Build
    needs: [rust-check, coverage, secrets-check]
    uses: ./.github/workflows/android-build.yml

  ios-build:
    name: iOS Build
    needs: [rust-check, coverage, secrets-check]
    uses: ./.github/workflows/ios-build.yml
