# Main CI orchestrator
# Add new jobs by creating reusable workflows and calling them here

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check
    uses: ./.github/workflows/rust-check.yml

  cross-check:
    name: Cross Check
    uses: ./.github/workflows/cross-check.yml

  coverage:
    name: Coverage
    uses: ./.github/workflows/coverage.yml

  audit:
    name: Dependency Audit
    uses: ./.github/workflows/audit.yml

  # Functional E2E gate (Phase 1): boots a hermetic strfry relay and an
  # Android emulator, runs the onboarding + circle-creation scenario, and
  # asserts both the UI state and the kind-1059 gift-wrap landing on the
  # relay. Required from PR #1 per the E2E pipeline plan.
  #
  # `needs: [rust-check]` (and intentionally NOT `coverage`) because E2E
  # is a functional signal, not a coverage signal; gating it on coverage
  # would couple unrelated checks.
  e2e-android:
    name: E2E Android
    needs: [rust-check]
    uses: ./.github/workflows/e2e-android.yml

  # Non-E2E integration-test lane (CI-4): runs the five formerly-orphan
  # Flutter integration tests (haven/integration_test/*.dart) that the
  # consolidated e2e_combined flow does NOT cover. Runs in PARALLEL with
  # e2e-android (both gated only on rust-check, neither `needs:` the
  # other), so wiring these in does not serialize behind the functional
  # gate — PR wall-clock is bounded by the slower of the two, not their
  # sum (keeps PRs fast per CI-6). The genuinely heavy lane — the flake
  # stress loop — is deliberately NOT here; it runs nightly/on-demand
  # via e2e-flakiness-stress.yml.
  e2e-integration:
    name: E2E Integration Tests
    needs: [rust-check]
    uses: ./.github/workflows/e2e-integration.yml

  android-build:
    name: Android Build
    needs: [rust-check, coverage]
    uses: ./.github/workflows/android-build.yml

  ios-build:
    name: iOS Build
    needs: [rust-check, coverage]
    uses: ./.github/workflows/ios-build.yml
