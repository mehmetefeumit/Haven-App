# Main CI orchestrator.
#
# Every job calls a reusable workflow (one file per concern); add a new check
# by creating a reusable workflow and wiring it here. The suite has five
# stages, visible in the job graph:
#
#   1. Code quality      — compile, lint, unit-test, coverage, dependency audit
#   2. Repo guards       — fast grep/bash policy + privacy invariants (one job)
#   3. Localization      — translation parity gate
#   4. E2E suites        — real app on an Android emulator / iOS simulator
#                          against hermetic Nostr relays (gated on rust only:
#                          E2E is a functional signal, not a coverage signal)
#   5. Build verification— debug builds for every mobile target
#
# All E2E lanes run in PARALLEL (each `needs:` only rust), so PR wall-clock is
# bounded by the slowest lane, not the sum.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — code quality
  # ---------------------------------------------------------------------------

  # rustfmt + clippy + tests + release-mode build for both crates
  # (haven-core and the rust_builder FFI surface).
  rust:
    name: Rust Checks
    uses: ./.github/workflows/rust-check.yml

  # `flutter analyze` (errors + warnings gate; pre-existing infos advisory).
  flutter:
    name: Flutter Checks
    uses: ./.github/workflows/flutter-check.yml

  # `cargo check` for macOS/iOS/Windows/Android targets — catches breaks in
  # #[cfg(target_os)] code that native Linux CI misses.
  cross-compile:
    name: Cross-Platform Compile
    uses: ./.github/workflows/cross-check.yml

  # Rust + Flutter unit tests with enforced coverage thresholds (80% / 50%),
  # plus the flag-off rollback-path unit re-run.
  coverage:
    name: Coverage
    uses: ./.github/workflows/coverage.yml

  # cargo-audit against the RustSec advisory DB (also runs weekly on its own).
  dependency-audit:
    name: Dependency Audit
    uses: ./.github/workflows/audit.yml

  # ---------------------------------------------------------------------------
  # Stage 2 — repo guards: every fast, deterministic policy/privacy invariant,
  # consolidated into one job (committed secrets, tile-provider policy,
  # public-profile privacy boundaries, INTERNET permission, background-wake
  # invariants, locale privacy, E2E-harness self-tests). One red run reports
  # ALL violated guards. See repo-guards.yml for the per-guard rationale.
  # ---------------------------------------------------------------------------

  guards:
    name: Repo Guards
    uses: ./.github/workflows/repo-guards.yml

  # ---------------------------------------------------------------------------
  # Stage 3 — localization: gen-l10n regeneration + cross-locale ARB parity
  # (keys / placeholders / ICU plural categories / untranslated copy). The AI
  # translation review (l10n-ai-review.yml) is a separate, advisory, PR-only
  # layer. Locale PRIVACY is enforced in Repo Guards above.
  # ---------------------------------------------------------------------------

  localization:
    name: Localization
    uses: ./.github/workflows/l10n-check.yml

  # ---------------------------------------------------------------------------
  # Stage 4 — end-to-end suites. Each lane boots the real app (Android AVD or
  # iOS simulator) against hermetic infrastructure (strfry relay, and a
  # Blossom server where profiles are involved) and drives a full user flow.
  # ---------------------------------------------------------------------------

  # The consolidated three-user core flow (onboarding, circle creation,
  # invitation, location sharing, leave) on Android. This lane runs the POLL
  # receive path — the production default while the live-sync flag is off —
  # so the retained poller keeps per-commit coverage. The live-sync scenarios
  # self-skip here and run flag-on in the dedicated lane below (both call the
  # SAME reusable lane, so the two paths cannot drift). Keep BOTH: replacing
  # this with `live_sync: true` would drop poll-path coverage before the flag
  # flips.
  e2e-android:
    name: E2E Core Flow (Android)
    needs: [rust]
    uses: ./.github/workflows/e2e-android.yml

  # Same core flow on a booted iOS simulator against a host-native relay
  # (macOS runners have no Linux Docker). Covers the iOS foreground
  # send/receive/MLS path; a simulator cannot reproduce real-device background
  # suspension (needs a real device — out of scope for hosted runners).
  e2e-ios:
    name: E2E Core Flow (iOS)
    needs: [rust]
    uses: ./.github/workflows/e2e-ios.yml

  # The same core-flow lanes built with the live-sync flag ON, so the
  # persistent relay-subscription engine path is exercised per commit
  # alongside the poll path above.
  e2e-android-live-sync:
    name: E2E Core Flow (Android, live-sync)
    needs: [rust]
    uses: ./.github/workflows/e2e-android.yml
    with:
      live_sync: true

  e2e-ios-live-sync:
    name: E2E Core Flow (iOS, live-sync)
    needs: [rust]
    uses: ./.github/workflows/e2e-ios.yml
    with:
      live_sync: true

  # The component-level integration tests (app boot, keyring, encryption
  # pipeline, member removal, admin-leave) that the consolidated core flow
  # does not cover — driven one target at a time on a single AVD with a fresh
  # relay per target.
  e2e-integration:
    name: E2E Integration Tests (Android)
    needs: [rust]
    uses: ./.github/workflows/e2e-integration.yml

  # Proves a user-customized relay set is honored, against TWO distinct
  # hermetic relays (a single relay cannot distinguish "published to custom"
  # from "published to default").
  e2e-relay-customization:
    name: E2E Relay Customization (Android)
    needs: [rust]
    uses: ./.github/workflows/e2e-relay-customization.yml

  # Runtime proof of the Android background catch-up worker: cold isolate
  # boot (Rust + keyring + SQLCipher), WorkManager job surviving a guest
  # reboot, and the pending-wipe + consent no-op gates — states no unit test
  # or static guard can reach. The orchestrator self-guards on the feature
  # flag and fails loudly if the flag is rolled back without removing this
  # entry.
  e2e-background-catchup:
    name: E2E Background Catch-up (Android)
    needs: [rust]
    uses: ./.github/workflows/e2e-background-catchup.yml

  # The public-profile flow (kind-0 + Blossom photo) on BOTH platforms:
  # publish, resolve, merge-preserving edit, and delete→npub-fallback against
  # a real hermetic relay + Blossom server.
  e2e-profile:
    name: E2E Public Profile (Android + iOS)
    needs: [rust]
    uses: ./.github/workflows/e2e-profile.yml

  # ---------------------------------------------------------------------------
  # Stage 5 — build verification: debug builds for every mobile target
  # (Android arm64/arm/x64 + iOS), proving the Flutter + Rust + toolchain
  # wiring end-to-end.
  # ---------------------------------------------------------------------------

  build:
    name: Debug Builds
    needs: [rust, coverage, guards]
    uses: ./.github/workflows/build-check.yml
