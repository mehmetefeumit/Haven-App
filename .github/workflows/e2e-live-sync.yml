# On-demand live-sync (M11 flag-on) E2E.
#
# The per-commit CI (ci.yml) now runs the flag-on lanes on EVERY push/PR via its
# dedicated `e2e-android-live-sync` / `e2e-ios-live-sync` jobs (promoted once the
# flag-on path proved green end-to-end). This workflow is retained as a manual
# convenience: trigger it (Actions -> "E2E Live-Sync (on-demand)" -> Run
# workflow) to re-run JUST the flag-on lanes on any branch without waiting for
# the full CI fleet.
#
# It builds the SAME e2e_combined.dart with `--dart-define=HAVEN_LIVE_SYNC=true`
# so the M11 scenarios run against the persistent live-sync engine (they
# self-skip on the poll-path lanes, which ci.yml still runs separately for the
# HAVEN_LIVE_SYNC-off production default).
#
# It reuses the SAME reusable lanes ci.yml calls (e2e-android.yml /
# e2e-ios.yml, via their `live_sync` input), so there is exactly one definition
# of each lane and the flag-on run cannot drift from the poll-path run.
name: E2E Live-Sync (on-demand)

on:
  workflow_dispatch:

jobs:
  e2e-android-live:
    name: E2E Android (live-sync)
    uses: ./.github/workflows/e2e-android.yml
    with:
      live_sync: true

  e2e-ios-live:
    name: E2E iOS (live-sync)
    uses: ./.github/workflows/e2e-ios.yml
    with:
      live_sync: true
