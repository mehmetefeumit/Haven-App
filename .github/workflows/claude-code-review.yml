name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip draft PRs: review once the author marks the PR
    # ready-for-review (which is in the trigger `types:` above), not on
    # every push to a still-in-progress draft. This is the sensible
    # default for an automated reviewer — it avoids burning review
    # cycles (and the OAuth token's quota) on unfinished work, and
    # surprises nobody: a draft simply isn't reviewed until it's
    # promoted. Removed the previous fully-commented-out author-filter
    # block, which was inert template boilerplate (it filtered to
    # specific usernames / first-time contributors that don't apply to
    # this repo) and left a confusing dead `if:` in the file.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

