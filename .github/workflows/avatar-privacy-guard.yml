# Reusable workflow: avatar privacy-boundary guard.
#
# Fails the build if the avatar feature ever grows a network/public-profile
# surface: an Image.network( anywhere under haven/lib, or — within the avatar
# code paths (Dart avatar files, haven-core/src/avatar, the avatar FFI block in
# rust_builder/src/api.rs) — a Kind::Metadata/kind-0 publish, a Blossom/CDN
# upload, an imeta/MIP-04 upload reference, or a non-wss http(s) fetch/upload
# URL. Haven avatars are E2E-encrypted and shared INLINE over MLS only; relays
# and CDNs must never be contacted for an avatar (SECURITY.md rule #8).
#
# Pure grep via scripts/ci/check_avatar_privacy_boundaries.sh — no Flutter/Rust
# toolchain, so it is fast and independent of the build/test lanes.

name: Avatar Privacy Guard

on:
  workflow_call:

jobs:
  avatar-privacy-guard:
    name: Avatar Privacy Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check avatar privacy boundaries
        run: bash scripts/ci/check_avatar_privacy_boundaries.sh
