# Reusable workflow: committed-secrets guard.
#
# Fails the build if the Stadia Maps API key (or any UUID-shaped secret) is
# committed, if the gitignored dart-define secrets file becomes tracked, or if
# the compile-time key-injection seam in tiles.dart regresses. Pure grep over
# `git ls-files` via scripts/ci/check_no_committed_secrets.sh — no Flutter/Rust
# toolchain, so it is fast and independent of the build/test lanes.

name: No Committed Secrets

on:
  workflow_call:

jobs:
  check-no-committed-secrets:
    name: No Committed Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for committed secrets
        run: bash scripts/ci/check_no_committed_secrets.sh
