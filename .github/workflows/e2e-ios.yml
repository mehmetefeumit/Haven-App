# Reusable workflow: iOS-simulator E2E functional gate (Tier 1).
#
# Runs the SAME consolidated multi-user flow as e2e-android.yml
# (haven/integration_test/e2e/e2e_combined.dart) on a booted iOS simulator:
# a real iOS-"Alice" UI drives the production Flutter app while Bob/Carol/Dave
# participate as in-process `SyntheticUser` FFI peers. All actors coordinate
# through a host-native Nostr relay on ws://localhost:7777.
#
# # Why macos-latest (Apple Silicon / arm64) works
#
# The QR-scanner plugin `mobile_scanner` is on 7.x, which migrated iOS/macOS
# from Google MLKit to Apple's Vision framework. Unlike MLKit (which shipped no
# arm64-simulator slice and forced `EXCLUDED_ARCHS[...]=arm64`, breaking the
# build on Apple-Silicon simulators), the Vision-based 7.x podspec excludes
# only the dead `i386` arch, so the app builds and runs on the arm64 simulator
# that macos-latest provides — the faster, longer-lived runner.
#
# # Why a host-native relay (not the strfry container)
#
# macOS GitHub runners have NO Linux Docker daemon, so the Android lane's
# `dockurr/strfry` container cannot run here. tooling/e2e/local-relay is a tiny
# standalone Rust binary built from the same nostr 0.44.x wire stack the app
# uses, reachable by the simulator at localhost (the simulator shares the host
# network namespace — no `10.0.2.2` alias).
#
# # What this lane covers — and what it does NOT
#
# It catches iOS-specific regressions in FFI/Rust dylib loading, SQLCipher +
# Keychain init, relay/WebSocket interop, and the MLS encrypt-publish-fetch-
# decrypt pipeline rendered into the UI — i.e. the FOREGROUND send/receive
# path the production iPhone bug lived in. It does NOT reproduce real-device
# background SUSPENSION: the simulator keeps the app alive and the
# integration_test VM-service stays attached, so a "background execution
# stops" bug will not surface here. That class needs a real device, which is
# out of scope for GitHub-hosted runners (see docs/E2E_TROUBLESHOOTING.md).
#
# All test-only Rust hooks are `#[cfg(debug_assertions)]` and `flutter test`
# builds debug, so the release pipeline is unaffected.

name: E2E iOS

on:
  workflow_call:
    inputs:
      live_sync:
        description: >-
          Set HAVEN_LIVE_SYNC on the e2e_combined step ONLY (S1: never on the
          shared ios_bg_mirror step, which must not start the engine). true
          exercises the live-sync engine path.
        type: boolean
        default: false
        required: false

jobs:
  e2e_ios:
    name: e2e_ios
    runs-on: macos-latest # Apple Silicon; arm64 simulator (no Linux Docker).
    # Envelope sized for a COLD first run. Poll path: setup (~10-15m) + the
    # e2e_combined step's 65m ceiling (2 × 30m) + the background-mirror step's
    # 45m ceiling — a loose backstop below that naive sum (the two steps rarely
    # both hit their ceilings). FLAG-ON widens the e2e_combined step to 95m
    # (2 × 45m, see below), so the flag-on envelope grows to 155 to cover the
    # PASSING serial case setup (~15) + e2e_combined (95) + the mirror (45)
    # — the mirror step is skipped when e2e_combined FAILS (no `if:`; default
    # step-on-failure semantics), so the failing path self-truncates well below
    # this. A flag-on run that burned its full drive budget must fail through
    # the step timeout with its diagnostics, never a blind outer-envelope
    # SIGKILL. Cached/typical runs finish in a fraction of this (macos-latest
    # allows up to 6h).
    timeout-minutes: ${{ inputs.live_sync && 155 || 90 }}
    env:
      HAVEN_E2E_RELAY: ws://localhost:7777
      FLUTTER_SUPPRESS_ANALYTICS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Simulator triple for Apple-Silicon runners — NOT the device
          # `aarch64-apple-ios` that build-check.yml installs. cargokit builds
          # the haven-core dylib for this target for the `flutter test` device
          # build. (`nc`, used by start-local-relay.sh, is preinstalled.)
          targets: aarch64-apple-ios-sim

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            haven-core
            tooling/e2e/local-relay
          key: e2e-ios-sim

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: haven
        run: flutter pub get

      # Build + start the relay BEFORE booting the simulator so the two
      # multi-GB build peaks (relay/cargo, then the Flutter+Rust app build)
      # never coincide with a resident simulator — the same build-before-boot
      # discipline e2e-android.yml uses for the AVD.
      - name: Build and start host-native relay
        run: bash tooling/e2e/ci/start-local-relay.sh 7777

      - name: Boot iOS simulator
        id: sim
        run: bash tooling/e2e/ci/boot-ios-sim.sh "iPhone 15"

      # `nick-fields/retry` absorbs the well-documented ~10% iOS-simulator
      # launch/attach flake (which presents as a HANG, not a fast fail). The
      # per-attempt timeout covers a COLD iOS build (Xcode + pod install +
      # aarch64 Rust, ~15 min) PLUS the inner test. On the POLL path the inner
      # test self-bounds at ~12 min, so 30 min/attempt is ample. FLAG-ON
      # (live_sync=true) runs the 10 live-sync scenarios instead — a ~25 min
      # inner suite (measured run 29262791698 attempt 2: full 12-test suite in
      # ~25.3 min). Cold build measured ~14 min (Xcode ~9.7 min + pods + aarch64
      # Rust), so a cold attempt is ~39 min — 30 min DID time out attempt 1 on
      # the cold build alone. The flag-on per-attempt is therefore widened to
      # 45 min (~39 min measured + slack; 40 would leave only ~1 min). The step
      # `timeout-minutes` MUST exceed max_attempts × timeout_minutes (flag-on:
      # 2 × 45 = 90) + slack, otherwise the outer step timeout fires mid-second
      # attempt and the retry buys nothing → flag-on step is 95 (poll keeps 65
      # over its 2 × 30 = 60). Each attempt restarts the relay first
      # (start-local-relay.sh stops any prior instance) so a retried attempt runs
      # against a CLEAN in-memory store — no leftover events from a failed prior
      # attempt (e.g. backdated NIP-59 gift-wraps) can leak across attempts. The
      # relay binary was already compiled in the build-before-boot step, so this
      # restart is fast.
      - name: Run e2e_combined on the simulator
        timeout-minutes: ${{ inputs.live_sync && 95 || 65 }}
        # S1: live-sync scoped to THIS step via the env the shared
        # run-ios-sim-scenario.sh reads — so it NEVER reaches the ios_bg_mirror
        # step below (which must not start the engine). That step sets no env, so
        # the script's HAVEN_LIVE_SYNC default (false) keeps it poll-path safe.
        env:
          HAVEN_LIVE_SYNC: ${{ inputs.live_sync }}
          # Single-engine for the driver (see main.dart): e2e_combined does not
          # exercise the foreground service, so skip its init to avoid a second
          # Flutter engine colliding with `flutter drive`. NOT set on the
          # background-mirror step below, which tests the background system.
          HAVEN_E2E_NO_BACKGROUND: "true"
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ inputs.live_sync && 45 || 30 }}
          max_attempts: 2
          command: >-
            bash tooling/e2e/ci/start-local-relay.sh 7777 &&
            bash tooling/e2e/ci/run-ios-sim-scenario.sh
            integration_test/e2e/e2e_combined.dart
            ${{ steps.sim.outputs.udid }}

      # Background-mirror check (docs/M7_BACKGROUND_SHARING.md D7): a SECOND,
      # cheap scenario on the SAME booted sim + relay. It proves the two iOS
      # wiring facts a host-side Dart unit test cannot see:
      # (a) writeCatchupEnabledMirror() reads back true, and (b) the Swift
      # teardown channels are registered + retained (no MissingPluginException).
      # Pods/Rust are cached from the e2e_combined build, so this incremental
      # build is bounded — 20 min/attempt is ample. Wrapped in nick-fields/retry
      # for the same ~10% sim launch/attach flake the first step absorbs.
      - name: Run iOS background-mirror scenario on the simulator
        timeout-minutes: 45
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: >-
            bash tooling/e2e/ci/run-ios-sim-scenario.sh
            integration_test/ios_bg_mirror_test.dart
            ${{ steps.sim.outputs.udid }}

      # NOTE: the background mirror is asserted at the OS (NSUserDefaults) layer INSIDE
      # ios_bg_mirror_test.dart — it writes the mirror to REAL UserDefaults and,
      # after reload(), reads it back from the NSUserDefaults domain the Swift side
      # consumes (`UserDefaults.standard.bool(forKey:)`). An EXTERNAL post-test
      # plist read (the former assert-ios-catchup-mirror.sh step) is impossible on
      # this lane: `flutter test` removes the app + its data container on
      # completion (unlike Android's `flutter drive`), so it could never resolve
      # the container — it never once passed in CI. The in-app read-back is the
      # authoritative check.

      - name: Collect simulator diagnostics
        if: always()
        run: |
          xcrun simctl spawn booted log collect --output /tmp/sim.logarchive 2>/dev/null || true
          cp /tmp/haven-local-relay.log /tmp/relay.log 2>/dev/null || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          # Suffix the flag-on run so it never collides with the poll-path
          # e2e-ios job's artifact when BOTH are called in one ci.yml run
          # (upload-artifact@v4+ rejects a duplicate name in the same run).
          name: e2e-ios${{ inputs.live_sync && '-live-sync' || '' }}-${{ github.run_id }}
          path: |
            /tmp/flutter-ios-test.log
            /tmp/relay.log
            /tmp/sim.logarchive
          retention-days: 14
          if-no-files-found: ignore

      # Relay teardown. Runs LAST and `if: always()` so the relay process is
      # killed on every outcome. The script always exits 0, so teardown can
      # never turn a green run red.
      - name: Tear down host-native relay
        if: always()
        run: bash tooling/e2e/ci/stop-local-relay.sh
