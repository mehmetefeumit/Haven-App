# Release build: produces key-injected, obfuscated release artifacts.
#
# Triggered ONLY by version tags (v*) and manual dispatch — NEVER on PRs, so the
# Stadia key and signing secrets never touch PR/debug builds. Both jobs go
# through scripts/build_release.sh, which injects STADIA_API_KEY (from the repo
# secret, via the env path so the key never appears in argv/logs), forces
# --obfuscate --split-debug-info, runs the no-committed-secrets guard, and sets
# HAVEN_RELEASE_WRAPPER=1 so the Gradle release gate passes.
#
# Required repository secret:
#   STADIA_API_KEY              Stadia Maps tile API key
# Optional (Android signing — falls back to debug signing if unset):
#   ANDROID_KEYSTORE_BASE64     base64 of the release keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_ALIAS           signing key alias
#   ANDROID_KEY_PASSWORD        signing key password
# iOS TestFlight (the ios job; provision certs once via the "iOS Certificates"
# workflow before the first tagged release — see haven/DEVELOPMENT.md):
#   MATCH_GIT_URL                 https URL of the private Match certs repo
#   MATCH_PASSWORD                passphrase that decrypts the stored certs
#   MATCH_GIT_BASIC_AUTHORIZATION base64 of "<github-user>:<PAT>" (read access here)
#   APPLE_TEAM_ID                 Apple Developer Team ID (10 chars)
#   ASC_KEY_ID                    App Store Connect API key id
#   ASC_ISSUER_ID                 App Store Connect API issuer id
#   ASC_KEY_P8_BASE64             base64 of the App Store Connect .p8 private key

name: Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android release (appbundle + apk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haven
    steps:
      - name: Free disk space
        working-directory: /
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/lib/android/sdk/system-images

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: release-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash ../scripts/ci/setup_android_signing.sh

      - name: Get dependencies
        run: flutter pub get

      # Version is single-sourced from the trigger: the git tag (vX.Y.Z -> X.Y.Z)
      # gives the marketing version; the run number gives a unique build number.
      # A manual (workflow_dispatch) run has no tag, so BUILD_NAME stays unset and
      # the build falls back to pubspec.yaml's version:.
      - name: Build release app bundle + APK
        env:
          STADIA_API_KEY: ${{ secrets.STADIA_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then export BUILD_NAME="${GITHUB_REF_NAME#v}"; fi
          bash ../scripts/build_release.sh appbundle
          bash ../scripts/build_release.sh apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-android
          path: |
            haven/build/app/outputs/bundle/release/app-release.aab
            haven/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload debug symbols (de-obfuscation)
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-android-symbols
          path: haven/build/symbols
          retention-days: 90

  ios:
    name: iOS release (TestFlight)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: haven
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: release-ios

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: haven/ios

      - name: Get dependencies
        run: flutter pub get

      # Install the Match-provisioned Apple Distribution cert + "match AppStore
      # com.oblivioustech.haven" profile READ-ONLY into a temporary CI keychain, and switch
      # the Runner target to manual signing so the archive can use them. Uses the
      # App Store Connect API key (no Apple ID / 2FA). Certificates are minted by
      # the separate "iOS Certificates" workflow, never here.
      - name: Install iOS signing assets (Fastlane Match)
        working-directory: haven/ios
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios prepare_signing

      # Inject the (non-secret) Team ID into ExportOptions.plist from the secret so
      # the Team ID is never committed. The profile is referenced by name, so this
      # is the only per-account value the export needs.
      - name: Render ExportOptions.plist Team ID
        working-directory: haven/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist

      # Single archive + export through the BLESSED wrapper: injects the Stadia key,
      # forces --obfuscate/--split-debug-info, runs the secret guard, compiles the
      # haven-core Rust pod for aarch64-apple-ios, and exports a SIGNED .ipa via
      # ios/ExportOptions.plist. BUILD_NUMBER = the run number -> unique & monotonic.
      - name: Build signed IPA (release wrapper)
        env:
          STADIA_API_KEY: ${{ secrets.STADIA_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then export BUILD_NAME="${GITHUB_REF_NAME#v}"; fi
          bash ../scripts/build_release.sh ipa

      - name: Upload to TestFlight
        working-directory: haven/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: bundle exec fastlane ios upload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-ios-ipa
          path: haven/build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload debug symbols (de-obfuscation)
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-ios-symbols
          path: haven/build/symbols
          retention-days: 90
