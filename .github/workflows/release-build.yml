# Release build: produces key-injected, obfuscated release artifacts.
#
# Triggered ONLY by version tags (v*) and manual dispatch — NEVER on PRs, so the
# Stadia key and signing secrets never touch PR/debug builds. Both jobs go
# through scripts/build_release.sh, which injects STADIA_API_KEY (from the repo
# secret, via the env path so the key never appears in argv/logs), forces
# --obfuscate --split-debug-info, runs the no-committed-secrets guard, and sets
# HAVEN_RELEASE_WRAPPER=1 so the Gradle release gate passes.
#
# Required repository secret:
#   STADIA_API_KEY              Stadia Maps tile API key
# Optional (Android signing — falls back to debug signing if unset):
#   ANDROID_KEYSTORE_BASE64     base64 of the release keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_ALIAS           signing key alias
#   ANDROID_KEY_PASSWORD        signing key password
# iOS TestFlight (the ios job; provision certs once via the "iOS Certificates"
# workflow before the first tagged release — see haven/DEVELOPMENT.md):
#   MATCH_GIT_URL                 https URL of the private Match certs repo
#   MATCH_PASSWORD                passphrase that decrypts the stored certs
#   MATCH_GIT_BASIC_AUTHORIZATION base64 of "<github-user>:<PAT>" (read access here)
#   APPLE_TEAM_ID                 Apple Developer Team ID (10 chars)
#   ASC_KEY_ID                    App Store Connect API key id
#   ASC_ISSUER_ID                 App Store Connect API issuer id
#   ASC_KEY_P8_BASE64             base64 of the App Store Connect .p8 private key

name: Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default: every job gets a read-only GITHUB_TOKEN; the android
# job overrides to `contents: write` for the GitHub Release. This pins downstream
# token scope (notably the zapstore job, which holds the Nostr publisher key)
# independent of the repo's default-permissions setting.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Release gate: the tagged commit MUST pass the deterministic checks before
  # any signed artifact is produced or uploaded. These are the same reusable
  # workflows PR CI (ci.yml) runs; invoking them here re-verifies them on the
  # exact tagged tree — without this gate a tag pushed onto a red/unverified
  # commit shipped straight to TestFlight. The emulator E2E lanes are
  # deliberately NOT part of this gate: their AVD nondeterminism must never
  # block a release of an already-green commit, so they stay the PR/nightly
  # functional signal. None of these reusables consume secrets, so no
  # `secrets:` pass-through is needed.
  # ---------------------------------------------------------------------------
  rust-check:
    name: Rust Check
    uses: ./.github/workflows/rust-check.yml

  cross-check:
    name: Cross Check
    uses: ./.github/workflows/cross-check.yml

  coverage:
    name: Coverage
    uses: ./.github/workflows/coverage.yml

  secrets-check:
    name: No Committed Secrets
    uses: ./.github/workflows/check-no-committed-secrets.yml

  tile-provider-check:
    name: Tile Provider Check
    uses: ./.github/workflows/tile-provider-check.yml

  android:
    name: Android release (per-ABI APKs)
    needs: [rust-check, cross-check, coverage, secrets-check, tile-provider-check]
    runs-on: ubuntu-latest
    # contents: write lets the built-in GITHUB_TOKEN create the GitHub Release and
    # attach the signed APKs. The GitHub Release is the canonical Android channel:
    # Obtainium and Zapstore both PULL from it (not from Actions artifacts, which
    # are auth-gated and expire). Least-privilege: only this job gets write;
    # everything else stays read-only.
    permissions:
      contents: write
    defaults:
      run:
        working-directory: haven
    steps:
      - name: Free disk space
        working-directory: /
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/lib/android/sdk/system-images

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: release-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash ../scripts/ci/setup_android_signing.sh

      # A tagged release MUST be release-signed. setup_android_signing.sh silently
      # falls back to DEBUG signing when the keystore secrets are absent (intended
      # only for workflow_dispatch dry-runs). A debug-signed APK on the public
      # Release would be signed with the universal androiddebugkey (public password
      # "android"), defeating update authentication and trapping early installers
      # behind an uninstall-to-migrate wall (which wipes their encrypted identity/
      # circles). Fail fast on tags if the release keystore wasn't configured.
      - name: Require release signing for tagged releases
        if: github.ref_type == 'tag'
        run: |
          test -f android/key.properties || {
            echo "::error::No release keystore configured (haven/android/key.properties missing)."
            echo "Refusing to build a tagged release that would be DEBUG-signed."
            echo "Set the ANDROID_KEYSTORE_* repository secrets before tagging."
            exit 1
          }

      - name: Get dependencies
        run: flutter pub get

      # Version is single-sourced from the trigger: the git tag (vX.Y.Z -> X.Y.Z)
      # gives the marketing version; the run number gives a unique build number.
      # A manual (workflow_dispatch) run has no tag, so BUILD_NAME stays unset and
      # the build falls back to pubspec.yaml's version:.
      - name: Build release APKs
        env:
          STADIA_API_KEY: ${{ secrets.STADIA_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then export BUILD_NAME="${GITHUB_REF_NAME#v}"; fi
          bash ../scripts/build_release.sh apk

      # SHA-256 sidecars so sideload users can verify integrity (the signing-cert
      # fingerprint published in the README verifies authenticity; these verify the
      # download). One per split APK, named <apk>.sha256.
      - name: Checksum APKs
        run: |
          cd build/app/outputs/flutter-apk
          for apk in app-*-release.apk; do
            sha256sum "${apk}" > "${apk}.sha256"
          done
          ls -la

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-android
          path: |
            haven/build/app/outputs/flutter-apk/app-*-release.apk
            haven/build/app/outputs/flutter-apk/app-*-release.apk.sha256
          retention-days: 14

      # The linchpin: attach the signed per-ABI APKs (+ checksums) to a real GitHub
      # Release so Obtainium and Zapstore can pull them. The de-obfuscation symbols
      # are NOT attached publicly (separate private artifact below) so the
      # obfuscation map is never handed to attackers. Tag pushes only — a manual
      # workflow_dispatch has no tag and must not publish a Release.
      #
      # NOTE: the app-*-release.apk glob is contractually tied to
      # scripts/build_release.sh apk producing --split-per-abi outputs; changing the
      # ABI-split scheme means updating this glob AND zapstore.yaml's `match` together.
      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Haven ${{ github.ref_name }}
          generate_release_notes: true
          # v*-beta.N / v*-rc.N (any tag containing '-') -> pre-release, never "Latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            haven/build/app/outputs/flutter-apk/app-*-release.apk
            haven/build/app/outputs/flutter-apk/app-*-release.apk.sha256

      - name: Upload debug symbols (de-obfuscation)
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-android-symbols
          path: haven/build/symbols
          retention-days: 90

  ios:
    name: iOS release (TestFlight)
    needs: [rust-check, cross-check, coverage, secrets-check, tile-provider-check]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: haven
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: release-ios

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: haven/ios

      - name: Get dependencies
        run: flutter pub get

      # Install the Match-provisioned Apple Distribution cert + "match AppStore
      # com.oblivioustech.haven" profile READ-ONLY into a temporary CI keychain, and switch
      # the Runner target to manual signing so the archive can use them. Uses the
      # App Store Connect API key (no Apple ID / 2FA). Certificates are minted by
      # the separate "iOS Certificates" workflow, never here.
      - name: Install iOS signing assets (Fastlane Match)
        working-directory: haven/ios
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios prepare_signing

      # Inject the (non-secret) Team ID into ExportOptions.plist from the secret so
      # the Team ID is never committed. The profile is referenced by name, so this
      # is the only per-account value the export needs.
      - name: Render ExportOptions.plist Team ID
        working-directory: haven/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist

      # Single archive + export through the BLESSED wrapper: injects the Stadia key,
      # forces --obfuscate/--split-debug-info, runs the secret guard, compiles the
      # haven-core Rust pod for aarch64-apple-ios, and exports a SIGNED .ipa via
      # ios/ExportOptions.plist. BUILD_NUMBER = the run number -> unique & monotonic.
      - name: Build signed IPA (release wrapper)
        env:
          STADIA_API_KEY: ${{ secrets.STADIA_API_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then export BUILD_NAME="${GITHUB_REF_NAME#v}"; fi
          bash ../scripts/build_release.sh ipa

      - name: Upload to TestFlight
        working-directory: haven/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: bundle exec fastlane ios upload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-ios-ipa
          path: haven/build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload debug symbols (de-obfuscation)
        uses: actions/upload-artifact@v6
        with:
          name: haven-release-ios-symbols
          path: haven/build/symbols
          retention-days: 90

  # ===========================================================================
  # PUSH fan-out. The Zapstore job depends ONLY on `android`, so a Zapstore
  # failure never blocks the iOS/TestFlight job, and the GitHub Release created in
  # the android job is already published regardless. It skips cleanly when its
  # secret is absent (forks / before the publisher key exists) by gating every
  # step on a job-level env var (secrets cannot be referenced in a job-level `if:`).
  # The pull-based channels — direct GitHub Release download and Obtainium — need
  # NO job here; they read the GitHub Release on their own cadence.
  # ===========================================================================

  # Zapstore (Nostr app store) — runs after the android job so the GitHub Release
  # exists; `zsp` pulls the arm64-v8a APK straight from the Release (zapstore.yaml
  # metadata_sources: github + match) and signs the Nostr events with SIGN_WITH.
  # It does NOT re-sign the APK, so Zapstore stays in Haven's single signing
  # lineage. Pre-release tags (vX.Y.Z-...) publish to the 'beta' channel (handled
  # in scripts/ci/publish_zapstore.sh).
  zapstore:
    name: Publish to Zapstore
    needs: [android]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    env:
      # zsp reads SIGN_WITH directly; also used to gate the steps (a bunker:// URL
      # is preferred over a raw nsec so the key never enters the runner env).
      SIGN_WITH: ${{ secrets.ZAPSTORE_SIGN_WITH }}
    steps:
      - name: Checkout
        if: ${{ env.SIGN_WITH != '' }}
        uses: actions/checkout@v6

      - name: Install zsp (pinned + sha256-verified)
        if: ${{ env.SIGN_WITH != '' }}
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/zsp" \
            https://github.com/zapstore/zsp/releases/download/v0.4.11/zsp-0.4.11-linux-amd64
          # Pin the exact binary (GitHub release assets are mutable) — this job
          # holds the Nostr publisher key, so verify before executing.
          echo "e17923e9436d6cac374e6ea012ba39aa1ca247751c47f8074ba005c654d4a241  ${RUNNER_TEMP}/zsp" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/zsp"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Publish to Zapstore
        if: ${{ env.SIGN_WITH != '' }}
        env:
          # Optional: lets zsp read the release/changelog without hitting GitHub
          # API rate limits. Read-only token is sufficient.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/publish_zapstore.sh

      - name: Skipped (no Zapstore secret)
        if: ${{ env.SIGN_WITH == '' }}
        run: echo "ZAPSTORE_SIGN_WITH not set — skipping Zapstore publish."
