# Reusable workflow: Coverage testing
# Runs unit tests with coverage for both Rust and Flutter packages
# Enforces 80% minimum coverage threshold for Rust, 50% for Flutter

name: Coverage

on:
  workflow_call:

jobs:
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haven-core

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core

      - name: Run tests with coverage
        run: |
          cargo llvm-cov --all-features --lcov --output-path coverage.lcov \
            --ignore-filename-regex 'frb_generated'

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage from lcov file
          COVERAGE=$(cargo llvm-cov --all-features \
            --ignore-filename-regex 'frb_generated' \
            --summary-only | grep 'TOTAL' | awk '{print $10}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"

          # Check if coverage meets threshold
          THRESHOLD=80
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi

      - name: Generate HTML report
        run: |
          cargo llvm-cov --all-features --html \
            --ignore-filename-regex 'frb_generated'

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: rust-coverage-report
          path: |
            haven-core/coverage.lcov
            haven-core/target/llvm-cov/html/
          retention-days: 30

  flutter-coverage:
    name: Flutter Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haven

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      # M11 Phase B: production now defaults `liveSyncEnabled` ON, so the
      # coverage run above (no --dart-define) builds the LIVE branches — the
      # engine-teardown-on-logout ordering (subscriptionService.stop() BEFORE
      # wipeAllMlsState()) and the member-location cache read path now execute in
      # that required gate. The retained short-poll FALLBACK branches
      # (`liveSyncEnabled = false`, kept ≥1 release for the one-line rollback)
      # become dead code there, so re-run the flag-sensitive unit groups with the
      # flag OFF to keep the rollback path's assertions — the poll-path
      # member-location self-exclusion and the logout ordering's engine-untouched
      # branch — executing in a required gate. (The flag-OFF e2e lanes also cover
      # the poll path at the integration level.) live_sync_provider_test is
      # deliberately NOT run here: it pins the compiled default, which is now ON.
      - name: Rollback-path flag-off unit check (retained short-poll path)
        run: >-
          flutter test
          test/providers/identity_provider_test.dart
          test/providers/location_sharing_provider_test.dart
          --dart-define=HAVEN_LIVE_SYNC=false

      - name: Remove generated files from coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          lcov --remove coverage/lcov.info \
            '**/test/**' \
            '**/src/rust/**' \
            '**/*.g.dart' \
            '**/*.freezed.dart' \
            '**/l10n/app_localizations*.dart' \
            -o coverage/lcov_filtered.info \
            --ignore-errors unused

      # NOTE: very_good_coverage@v3 still runs on Node.js 20 (deprecated June 2026).
      # No upstream Node 24 release as of 2026-05-10. Track the action repo and
      # replace with a Node 24-capable alternative (or a small inline lcov check)
      # before GitHub forces Node 24.
      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: haven/coverage/lcov_filtered.info
          min_coverage: 50

      - name: Generate HTML report
        run: genhtml coverage/lcov_filtered.info -o coverage/html

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: flutter-coverage-report
          path: |
            haven/coverage/lcov_filtered.info
            haven/coverage/html/
          retention-days: 30
