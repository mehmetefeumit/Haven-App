# Reusable workflow: Android E2E functional gate.
#
# Single-AVD job driving the consolidated three-user Haven flow at
# `haven/integration_test/e2e/e2e_combined.dart`.
#
# Architecture: Alice drives the production Flutter UI on the AVD;
# Bob and Carol participate as in-process `SyntheticUser` instances
# via the Rust FFI. All three coordinate through a single hermetic
# strfry container. There is no multi-AVD orchestration.
#
# # Why one AVD
#
# The prior multi-AVD architecture (3 emulators on one runner)
# over-committed `ubuntu-latest`'s ~7 GB of usable RAM and produced
# `kswapd0`/`lmkd` thrash plus 1.8-2.7 s EGL frame times. Element-web
# (the closest precedent for multi-user E2E messaging tests on
# GitHub Actions) solves the same memory pressure by running ONE
# UI client per runner and simulating other actors in-process —
# Haven's `SyntheticUser` pattern is the direct analog. One AVD,
# one process, real MLS protocol path for all three actors.
#
# All test-only Rust hooks (relay override, in-memory keyring,
# `ws://` allow-list for loopback) are gated by `#[cfg(debug_assertions)]`
# and `flutter drive` builds in debug mode, so the release pipeline
# is unaffected.

name: E2E Android

on:
  workflow_call:

jobs:
  # ============================================================================
  # e2e_android — single AVD; one Flutter UI process + in-process
  # synthetic peers.
  # ============================================================================
  e2e_android:
    name: e2e_android
    runs-on: ubuntu-latest
    # The inner Dart test self-bounds at 12 minutes
    # (`e2e_combined.dart` `_outerTestTimeout`), so ~12 minutes IS the
    # worst case by construction: a cold AVD (boot + Gradle +
    # onboarding settle + 5 phases) that runs long surfaces as a clean
    # assertion failure at that self-imposed ceiling rather than as the
    # outer job timeout. This 60-minute `timeout-minutes` is only the
    # outer envelope, sized with comfortable slack above the 12-minute
    # ceiling. (The 12-minute figure is the single source of truth for
    # worst case; the runbook and this comment state it consistently.)
    timeout-minutes: 60
    env:
      HAVEN_E2E_RELAY: ws://10.0.2.2:7777
      FLUTTER_SUPPRESS_ANALYTICS: "true"

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: e2e-android-x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: haven
        run: flutter pub get

      # Build the test APK BEFORE the emulator boots. The Rust-NDK +
      # Gradle compile peaks at several GB; running it concurrently
      # with a booted emulator + strfry container previously lost the
      # GitHub-hosted runner mid-step (the runner died with no logs
      # and no artifacts — see docs/E2E_TROUBLESHOOTING.md). Building
      # here, with nothing else resident, keeps the build peak and
      # the emulator peak from ever coinciding. The resulting APK is
      # staged at /tmp/scenario.apk; run-single-avd-scenario.sh
      # detects it and skips its own build.
      - name: Build E2E test APK
        working-directory: haven
        # Bounds a hung build (e.g. a cargo network stall) so it
        # fails fast instead of burning toward the 60-min job
        # timeout — symmetric with the drive step's timeout below.
        timeout-minutes: 25
        # HAVEN_E2E_RELAY comes from the job-level `env:` block and is
        # already exported into every `run:` step. The --dart-define
        # baked here MUST match the relay URL the drive step uses,
        # since the value is compiled into the APK (drive does not
        # re-pass it).
        run: |
          flutter build apk \
            --debug \
            --target=integration_test/e2e/e2e_combined.dart \
            --dart-define=HAVEN_E2E_RELAY="${HAVEN_E2E_RELAY}"
          cp build/app/outputs/flutter-apk/app-debug.apk /tmp/scenario.apk
          ls -lh /tmp/scenario.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-google_apis-single-v1

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Start strfry relay
        env:
          # Pin to an immutable multi-arch manifest digest for
          # supply-chain reproducibility (a floating `:latest` could
          # silently change the relay's behaviour between runs).
          # `sha256:5455...` is the digest of `dockurr/strfry:1.1.0`
          # (== `:latest` as of 2026-06-07), resolved via the Docker
          # Hub registry API; see docs/E2E_TROUBLESHOOTING.md for how
          # to re-resolve and bump it. Set the `STRFRY_IMAGE` repo
          # variable to override (it wins when non-empty);
          # `start-strfry.sh` falls back to this same pinned digest
          # when the variable is unset.
          STRFRY_IMAGE: ${{ vars.STRFRY_IMAGE || 'dockurr/strfry@sha256:545555da5dd2c2b502f2c0d159f4dc4996d0e488e3bf25905ce881722d63d2c5' }}
        run: bash tooling/e2e/ci/start-strfry.sh

      # Install + grant + drive ONLY — the APK was built in the
      # "Build E2E test APK" step above, so this step does no Gradle
      # work and the emulator is the dominant memory consumer.
      #
      # `timeout-minutes: 20` bounds a hung drive so GitHub kills
      # THIS step at a known point (the inner Dart test self-bounds
      # at 12 min; 20 covers install + grant + drive + teardown
      # slack). A clean step timeout lets the `if: always()` /
      # `if: failure()` diagnostic + artifact steps run, so a future
      # hang yields real logs instead of a silently lost runner.
      - name: Run e2e_combined on the emulator
        timeout-minutes: 20
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Single-line `script:` — the reactivecircus action runs
          # each line of a multi-line `script:` in a separate
          # `sh -c`, so any shell state (cd, vars, background PIDs)
          # would be lost across lines. Wrapping in one bash file
          # keeps state coherent.
          script: bash tooling/e2e/ci/run-single-avd-scenario.sh integration_test/e2e/e2e_combined.dart

      - name: Collect strfry logs
        if: always()
        run: |
          docker logs strfry > /tmp/strfry.log 2>&1 || true

      # Capture a snapshot of host + emulator state so a future "the
      # failure was caused by OOM at 22:17" hypothesis can be tested
      # from the artifact alone, without re-running. `|| true` on
      # each command so a partial failure doesn't mask the real
      # cause being uploaded above.
      - name: Capture host + emulator diagnostics
        if: failure()
        run: |
          {
            echo "=== df -h ==="
            df -h || true
            echo
            echo "=== free -h ==="
            free -h || true
            echo
            echo "=== adb devices -l ==="
            adb devices -l || true
            echo
            echo "=== adb shell dumpsys meminfo com.haven.app ==="
            adb shell dumpsys meminfo com.haven.app || true
            echo
            echo "=== top (1 sample) ==="
            top -bn1 | head -40 || true
          } > /tmp/diag.txt 2>&1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-android-${{ github.run_id }}
          path: |
            /tmp/adb-logcat.log
            /tmp/flutter-drive.log
            /tmp/strfry.log
            /tmp/diag.txt
            /tmp/scenario.apk
          retention-days: 14
          if-no-files-found: ignore

      # Relay teardown (CI-1). Runs LAST and `if: always()` so the
      # strfry container + its host data dir are removed on every
      # outcome (pass, fail, or step timeout), leaving no stale events
      # for a later run on a reused runner. Placed AFTER "Collect
      # strfry logs" (which reads `docker logs strfry`) and the
      # artifact upload so neither is starved of the container. The
      # script is best-effort and always exits 0, so teardown can
      # never turn a green run red.
      - name: Tear down strfry relay
        if: always()
        run: bash tooling/e2e/ci/stop-strfry.sh
