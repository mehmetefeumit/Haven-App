# Reusable workflow: Android E2E functional gate.
#
# Single-AVD job driving the consolidated three-user Haven flow at
# `haven/integration_test/e2e/e2e_combined.dart`.
#
# Architecture: Alice drives the production Flutter UI on the AVD;
# Bob and Carol participate as in-process `SyntheticUser` instances
# via the Rust FFI. All three coordinate through a single hermetic
# strfry container. There is no multi-AVD orchestration.
#
# # Why one AVD
#
# The prior multi-AVD architecture (3 emulators on one runner)
# over-committed `ubuntu-latest`'s ~7 GB of usable RAM and produced
# `kswapd0`/`lmkd` thrash plus 1.8-2.7 s EGL frame times. Element-web
# (the closest precedent for multi-user E2E messaging tests on
# GitHub Actions) solves the same memory pressure by running ONE
# UI client per runner and simulating other actors in-process —
# Haven's `SyntheticUser` pattern is the direct analog. One AVD,
# one process, real MLS protocol path for all three actors.
#
# All test-only Rust hooks (relay override, in-memory keyring,
# `ws://` allow-list for loopback) are gated by `#[cfg(debug_assertions)]`
# and `flutter drive` builds in debug mode, so the release pipeline
# is unaffected.

name: E2E Android

on:
  workflow_call:
    inputs:
      live_sync:
        description: >-
          Build e2e_combined with --dart-define=HAVEN_LIVE_SYNC. true exercises
          the M11 live-sync engine path (the PR gate opts in via ci.yml); false
          (default) keeps the retained poller path — the M11 scenarios self-skip.
        type: boolean
        default: false
        required: false

jobs:
  # ============================================================================
  # e2e_android — single AVD; one Flutter UI process + in-process
  # synthetic peers.
  # ============================================================================
  e2e_android:
    name: e2e_android
    runs-on: ubuntu-latest
    # The inner Dart test self-bounds at 12 minutes
    # (`e2e_combined.dart` `_outerTestTimeout`), so ~12 minutes IS the
    # worst case by construction: a cold AVD (boot + Gradle +
    # onboarding settle + 5 phases) that runs long surfaces as a clean
    # assertion failure at that self-imposed ceiling rather than as the
    # outer job timeout. This 60-minute `timeout-minutes` is only the
    # outer envelope, sized with comfortable slack above the 12-minute
    # ceiling. (The 12-minute figure is the single source of truth for
    # worst case; the runbook and this comment state it consistently.)
    timeout-minutes: 60
    env:
      HAVEN_E2E_RELAY: ws://10.0.2.2:7777
      FLUTTER_SUPPRESS_ANALYTICS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Reclaim runner disk BEFORE the Gradle/Rust build — the multi-GB
      # debug build + NDK strip has run a default runner out of space.
      # Runs after checkout because the script lives in the repo.
      - name: Free disk space
        run: bash tooling/e2e/ci/free-disk-space.sh

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: e2e-android-x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: haven
        run: flutter pub get

      # Build the test APK BEFORE the emulator boots. The Rust-NDK +
      # Gradle compile peaks at several GB; running it concurrently
      # with a booted emulator + strfry container previously lost the
      # GitHub-hosted runner mid-step (the runner died with no logs
      # and no artifacts — see docs/E2E_TROUBLESHOOTING.md). Building
      # here, with nothing else resident, keeps the build peak and
      # the emulator peak from ever coinciding. The resulting APK is
      # staged at /tmp/scenario.apk; run-single-avd-scenario.sh
      # detects it and skips its own build.
      - name: Build E2E test APK
        working-directory: haven
        # Bounds a hung build (e.g. a cargo network stall) so it
        # fails fast instead of burning toward the 60-min job
        # timeout — symmetric with the drive step's timeout below.
        timeout-minutes: 25
        # HAVEN_E2E_RELAY comes from the job-level `env:` block and is
        # already exported into every `run:` step. The --dart-define
        # baked here MUST match the relay URL the drive step uses,
        # since the value is compiled into the APK (drive does not
        # re-pass it).
        #
        # `--target-platform android-x64`: the AVD is x86_64, so that is
        # the only ABI the APK will ever run on. Without this flag cargokit
        # compiles the large (debug) haven-core Rust lib for every default
        # ABI — and for a debug build it ADDS android-x86/x64 on top of
        # arm/arm64 (rust_builder/cargokit/gradle/plugin.gradle), i.e. four
        # ABIs. That multi-ABI Rust build plus the NDK `stripDebugSymbols`
        # pass exhausted the runner disk ("No space left on device").
        # x86_64-only roughly halves the native build/strip footprint and
        # the wall-clock. cargokit auto-installs any missing rustup target.
        run: |
          flutter build apk \
            --debug \
            --target-platform android-x64 \
            --target=integration_test/e2e/e2e_combined.dart \
            --dart-define=HAVEN_E2E_RELAY="${HAVEN_E2E_RELAY}" \
            --dart-define=HAVEN_LIVE_SYNC=${{ inputs.live_sync }} \
            --dart-define=HAVEN_E2E_NO_BACKGROUND=true
          cp build/app/outputs/flutter-apk/app-debug.apk /tmp/scenario.apk
          ls -lh /tmp/scenario.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-google_apis-single-v1

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Start strfry relay
        env:
          # Pin to an immutable multi-arch manifest digest for
          # supply-chain reproducibility (a floating `:latest` could
          # silently change the relay's behaviour between runs).
          # `sha256:5455...` is the digest of `dockurr/strfry:1.1.0`
          # (== `:latest` as of 2026-06-07), resolved via the Docker
          # Hub registry API; see docs/E2E_TROUBLESHOOTING.md for how
          # to re-resolve and bump it. Set the `STRFRY_IMAGE` repo
          # variable to override (it wins when non-empty);
          # `start-strfry.sh` falls back to this same pinned digest
          # when the variable is unset.
          STRFRY_IMAGE: ${{ vars.STRFRY_IMAGE || 'dockurr/strfry@sha256:545555da5dd2c2b502f2c0d159f4dc4996d0e488e3bf25905ce881722d63d2c5' }}
        run: bash tooling/e2e/ci/start-strfry.sh

      # Install + grant + drive ONLY — the APK was built in the
      # "Build E2E test APK" step above, so this step does no Gradle
      # work and the emulator is the dominant memory consumer.
      #
      # CRITICAL: the reactivecircus action's `timeout-minutes` does NOT
      # reliably reap its backgrounded emulator/adb/drive subtree — a hang
      # here ran the FULL ~45 min to the 60-min JOB timeout TWICE (runs
      # 28056995601, 28065762568), and a job-timeout SIGKILL fires BEFORE
      # the `if: failure()` diagnostic + artifact steps, leaving zero logs.
      # We therefore do NOT trust `timeout-minutes`; the RELIABLE bound is
      # an explicit `timeout` wrapping the script (a plain coreutils
      # timeout, immune to the action's process handling). `timeout-
      # minutes: 30` is only a loose belt above that explicit 16-min bound.
      - name: Run e2e_combined on the emulator
        timeout-minutes: 30
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Bound a hung emulator BOOT so it fails fast (≤7 min) rather
          # than stalling toward the job timeout with no diagnostics.
          emulator-boot-timeout: 420
          # Single-line `script:` — the reactivecircus action runs each
          # line of a multi-line `script:` in a separate `sh -c`, so any
          # shell state would be lost across lines; chaining with `&&`
          # keeps it one shell.
          #
          # The whole script is wrapped in an explicit `timeout` (SIGTERM
          # at 16 min, SIGKILL 60 s later) because the action's own
          # `timeout-minutes` does not reliably reap a hung emulator/adb/
          # drive subtree (see the step comment above). A healthy run does
          # install+grant+drive in ~11 min, so 16 min never cuts a passing
          # run but converts ANY hang (the guard, adb install/grant, or
          # the drive) into a CLEAN step failure whose `if: failure()`
          # diagnostic + artifact steps actually run.
          #
          # The network-egress guard (reject outbound TCP 80/443) runs
          # FIRST, INSIDE this script — i.e. AFTER the action has
          # downloaded the emulator SDK and booted the AVD — so it guards
          # only the flutter-drive test run and NEVER blocks the
          # emulator's own SDK download (dl.google.com:443). Loopback /
          # strfry (7777) / Docker-bridge / ESTABLISHED stay allowed, so
          # an accidental blob-server upload during the avatar phase still
          # RSTs and fails the lane. The guard is torn down by the
          # dedicated `if: always()` step below BEFORE any step needing
          # outbound HTTPS — otherwise its own :443 reject rule would RST
          # the artifact-upload + cache-save POST steps and silently lose
          # the diagnostics.
          script: timeout --kill-after=60s 16m bash -c 'bash tooling/e2e/ci/setup-network-guard.sh && bash tooling/e2e/ci/run-single-avd-scenario.sh integration_test/e2e/e2e_combined.dart'

      # Tear the egress guard down BEFORE anything that needs outbound
      # HTTPS. The guard's `REJECT ... --reject-with tcp-reset` on TCP 443
      # stays installed for the rest of the job otherwise, RSTing the
      # actions/upload-artifact + actions/cache POST steps (both upload
      # over :443) and silently dropping the very diagnostics we depend on
      # — the root reason prior failures produced NO artifact. The guard
      # has already covered the entire flutter-drive run above, so removing
      # it now costs zero coverage. Best-effort (`|| true`) so it can never
      # turn a run red.
      - name: Remove network egress guard
        if: always()
        run: |
          sudo iptables -D OUTPUT -j HAVEN_E2E_GUARD 2>/dev/null || true
          sudo iptables -F HAVEN_E2E_GUARD 2>/dev/null || true
          sudo iptables -X HAVEN_E2E_GUARD 2>/dev/null || true
          echo "Egress guard removed (if it was present)."

      - name: Collect strfry logs
        if: always()
        run: |
          docker logs strfry > /tmp/strfry.log 2>&1 || true

      # Capture a snapshot of host + emulator state so a future "the
      # failure was caused by OOM at 22:17" hypothesis can be tested
      # from the artifact alone, without re-running. `|| true` on
      # each command so a partial failure doesn't mask the real
      # cause being uploaded above.
      - name: Capture host + emulator diagnostics
        if: failure()
        run: |
          {
            echo "=== df -h ==="
            df -h || true
            echo
            echo "=== free -h ==="
            free -h || true
            echo
            echo "=== adb devices -l ==="
            adb devices -l || true
            echo
            echo "=== adb shell dumpsys meminfo com.oblivioustech.haven ==="
            adb shell dumpsys meminfo com.oblivioustech.haven || true
            echo
            echo "=== top (1 sample) ==="
            top -bn1 | head -40 || true
          } > /tmp/diag.txt 2>&1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-android-${{ github.run_id }}
          path: |
            /tmp/adb-logcat.log
            /tmp/flutter-drive.log
            /tmp/strfry.log
            /tmp/diag.txt
            /tmp/scenario.apk
          retention-days: 14
          if-no-files-found: ignore

      # Relay teardown (CI-1). Runs LAST and `if: always()` so the
      # strfry container + its host data dir are removed on every
      # outcome (pass, fail, or step timeout), leaving no stale events
      # for a later run on a reused runner. Placed AFTER "Collect
      # strfry logs" (which reads `docker logs strfry`) and the
      # artifact upload so neither is starved of the container. The
      # script is best-effort and always exits 0, so teardown can
      # never turn a green run red.
      - name: Tear down strfry relay
        if: always()
        run: bash tooling/e2e/ci/stop-strfry.sh
