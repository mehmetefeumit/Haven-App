          script: bash tooling/e2e/ci/run-two-avd-scenario.sh integration_test/e2e/scenario_04_non_admin_leave.dart

      - name: Collect strfry logs
        if: always()
        run: |
          docker logs strfry > /tmp/strfry.log 2>&1 || true

      - name: Upload failure artifacts
