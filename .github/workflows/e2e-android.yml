        with:
          name: e2e-android-scenario_04-${{ github.run_id }}
          path: |
            /tmp/alice-logcat.log
            /tmp/bob-logcat.log
            /tmp/alice-test.log
            /tmp/bob-test.log
            /tmp/bob-emulator.log
            /tmp/strfry.log
          retention-days: 14
          if-no-files-found: ignore

  # ============================================================================
  # Scenario 05 — two-AVD coordinated: admin leave (ghost-admin path).
  #
  # Alice publishes a raw admin SelfRemove via the debug-only
  # leaveCircleBypassHandoffForTest hook. Bob's UI must surface the
  # "Leaving…" badge on Alice's tile (production
  # pendingDepartureProvider + circle_member_tile.dart code path).
  # ============================================================================
  scenario_05:
    name: scenario_05_admin_leave_ghost
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HAVEN_E2E_RELAY: ws://10.0.2.2:7777
      FLUTTER_SUPPRESS_ANALYTICS: "true"

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
