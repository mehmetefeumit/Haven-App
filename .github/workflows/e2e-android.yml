            ~/.android/adb*
          key: avd-api34-x86_64-google_apis-pair-v1

      - name: Prebuild AVD snapshots (alice + bob)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
