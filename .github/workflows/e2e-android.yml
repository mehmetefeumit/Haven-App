    name: scenario_05_admin_leave_ghost
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      strfry:
        # Image pin: set `STRFRY_IMAGE` repository variable
        # (Settings → Variables → Actions) to `dockurr/strfry@sha256:<digest>`
        # for full supply-chain reproducibility. The `:latest` fallback
        # keeps the workflow runnable out of the box.
        image: ${{ vars.STRFRY_IMAGE || 'dockurr/strfry:latest' }}
        ports:
          - 7777:7777
        options: >-
          --health-cmd="nc -z 127.0.0.1 7777 || exit 1"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=15
          --health-start-period=3s

