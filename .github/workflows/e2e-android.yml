# Reusable workflow: Android E2E functional gate.
#
# Single job — `e2e_android` — that drives the consolidated three-user
# Haven flow at `haven/integration_test/e2e/e2e_combined.dart` across
# three AVDs (alice / bob / carol) coordinated via a hermetic strfry
# relay.
#
# The scenario exercises every priority flow end-to-end:
#   1. identity loading on each role
#   2. 3-member circle creation + multi-recipient Welcome
#   3. invitation accept on both joiners
#   4. 3-way location sharing (each role sees the other two markers)
#   5. admin leave with `LeavePlan::AdminHandoff` (3-commit sequence)
#   6. non-admin leave from the residual 2-member group
#
# The three Patrol processes share a single strfry Docker service
# container; each emulator reaches the host via the well-known
# `10.0.2.2:7777` alias. All test-only Rust hooks (relay override,
# in-memory keyring, `ws://` allow-list for loopback) are gated by
# `#[cfg(debug_assertions)]` and `flutter drive` builds in debug
# mode, so the release pipeline is unaffected.
#
# # History
#
# This workflow used to fan out across five scenario_* jobs plus a
# `ghost_admin_safety_net` FFI tripwire job. The five scenario_*
# files were consolidated into `e2e_combined.dart` so they all live
# in one place and share infrastructure — the CI mirrors that
# consolidation here. The ghost-admin FFI test
# (`integration_test/circle_admin_leave_ghost_test.dart`) remains in
# the tree for local invocation but is no longer in CI; the admin-
# leave path is now exercised through the production UI inside the
# consolidated test, which catches the regressions the safety net
# was guarding against.

name: E2E Android

on:
  workflow_call:

jobs:
  # ============================================================================
  # e2e_android — single consolidated 3-AVD job.
  # ============================================================================
  e2e_android:
    name: e2e_android
    runs-on: ubuntu-latest
    # The consolidated scenario covers every previously-separate flow
    # serially; budget is the sum of cold-AVD boot (×3 emulators), 3
    # serial APK builds, 25-min inner test timeout, and slack for
    # artifact upload. 90 min is the floor with comfortable headroom;
    # the inner test self-bounds at 25 min so a hang surfaces as a
    # clean assertion failure rather than the outer timeout.
    timeout-minutes: 90
    env:
      HAVEN_E2E_RELAY: ws://10.0.2.2:7777
      FLUTTER_SUPPRESS_ANALYTICS: "true"

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: haven-core
          key: e2e-android-x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: haven
        run: flutter pub get

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # AVD cache key bumped to v2 + `triad` so it does not collide
      # with the historical `pair` and `single` keys from the
      # fanned-out scenarios. Three AVDs (`test`, `bob_avd`,
      # `carol_avd`) end up in this cache.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-google_apis-triad-v1

      - name: Prebuild AVD snapshots (alice + bob + carol)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          # Single-line `script:` so the reactivecircus action's
          # line-by-line `sh -c` execution doesn't fragment our
          # shell state. The real logic lives in the script file —
          # see comments there for the rationale.
          script: bash tooling/e2e/ci/prebuild-secondary-avds.sh

      - name: Start strfry relay
        env:
          # The bash script defaults to `dockurr/strfry:latest` when
          # the repo variable is unset; this passes through a digest
          # pin like `dockurr/strfry@sha256:...` when one is configured.
          STRFRY_IMAGE: ${{ vars.STRFRY_IMAGE }}
        run: bash tooling/e2e/ci/start-strfry.sh

      - name: Run e2e_combined on three emulators
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          # The action boots the primary emulator (`test` on port 5554)
          # with these options; the harness script boots bob_avd and
          # carol_avd with a matching `-memory 1536` to stay inside the
          # `ubuntu-latest` 7 GB ceiling once Gradle is also running.
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
            -memory 1536
          disable-animations: true
          # Single-line `script:` — see tooling/e2e/ci/ scripts for
          # the rationale (reactivecircus action runs each line of a
          # multi-line `script:` in a separate `sh -c`, breaking
          # any reliance on persisted shell state).
          script: bash tooling/e2e/ci/run-three-avd-scenario.sh integration_test/e2e/e2e_combined.dart

      - name: Collect strfry logs
        if: always()
        run: |
          docker logs strfry > /tmp/strfry.log 2>&1 || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-android-${{ github.run_id }}
          path: |
            /tmp/alice-logcat.log
            /tmp/bob-logcat.log
            /tmp/carol-logcat.log
            /tmp/alice-test.log
            /tmp/bob-test.log
            /tmp/carol-test.log
            /tmp/alice-install.log
            /tmp/bob-install.log
            /tmp/carol-install.log
            /tmp/alice-grant.log
            /tmp/bob-grant.log
            /tmp/carol-grant.log
            /tmp/bob-emulator.log
            /tmp/carol-emulator.log
            /tmp/strfry.log
          retention-days: 14
          if-no-files-found: ignore
