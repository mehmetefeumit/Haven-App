          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          # Single-line `script:` — see tooling/e2e/ci/ scripts for
          # the rationale.
          script: bash tooling/e2e/ci/prebuild-bob-avd.sh

      - name: Start strfry relay
        env:
          # The bash script defaults to `dockurr/strfry:latest` when
          # the repo variable is unset; this passes through a digest
          # pin like `dockurr/strfry@sha256:...` when one is configured.
          STRFRY_IMAGE: ${{ vars.STRFRY_IMAGE }}
        run: bash tooling/e2e/ci/start-strfry.sh

      - name: Run scenario_04 on two emulators
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
            -memory 2048
          disable-animations: true
