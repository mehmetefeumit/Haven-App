          if-no-files-found: ignore

  # ============================================================================
  # Ghost-admin FFI safety net — single-AVD, no relay needed.
  #
  # Pairs with scenario_05: scenario_05 covers the badge UI; this job
  # covers the RemoveMember commit publication acceptance hook by
  # exercising the full IgnoredProposal → RemoveMember recovery path
  # directly through the FFI in a single process. No strfry container —
  # events flow directly between two in-process CircleManagerFfi
  # instances.
  # ============================================================================
  ghost_admin_safety_net:
    name: ghost_admin_safety_net
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLUTTER_SUPPRESS_ANALYTICS: "true"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
