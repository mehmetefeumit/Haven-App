# Reusable workflow: Cross-compilation checks
# Verifies cfg-gated platform code in rust_builder compiles for all target OSes
# Catches errors in #[cfg(target_os)] blocks that native Linux CI misses

name: Cross Check

on:
  workflow_call:

jobs:
  apple:
    name: Apple (macOS + iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, aarch64-apple-ios

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            haven-core
            haven/rust_builder
          key: cross-apple

      - name: Check macOS (aarch64-apple-darwin)
        working-directory: haven/rust_builder
        run: cargo check --target aarch64-apple-darwin

      - name: Check iOS (aarch64-apple-ios)
        working-directory: haven/rust_builder
        run: cargo check --target aarch64-apple-ios

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            haven-core
            haven/rust_builder
          key: cross-windows

      - name: Check Windows (x86_64-pc-windows-msvc)
        working-directory: haven/rust_builder
        run: cargo check --target x86_64-pc-windows-msvc

  android:
    name: Android (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            haven-core
            haven/rust_builder
          key: cross-android

      - name: Setup Android NDK environment
        run: |
          NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"

          # Cargo/cc-rs env vars for the Android target
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android24-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"

          # libsqlite3-sys pulls in vendored OpenSSL on Android (bundled-sqlcipher-
          # vendored-openssl — see CLAUDE.md). openssl-src drives OpenSSL's own
          # Makefile which invokes $(CROSS_COMPILE)ranlib, $(CROSS_COMPILE)ar etc.
          # NDK r23+ renamed these to llvm-*, so we symlink the arch-prefixed
          # names the Makefile expects. Also export the toolchain bin dir so any
          # other build script relying on PATH lookup succeeds.
          echo "${TOOLCHAIN}/bin" >> "$GITHUB_PATH"
          for tool in ar ranlib strip nm objdump readelf objcopy; do
            ln -sf "${TOOLCHAIN}/bin/llvm-${tool}" \
                   "${TOOLCHAIN}/bin/aarch64-linux-android-${tool}"
          done

      - name: Check Android (aarch64-linux-android)
        working-directory: haven/rust_builder
        run: cargo check --target aarch64-linux-android
