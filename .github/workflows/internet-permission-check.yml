# Reusable workflow: Android INTERNET-permission regression guard (M7-8).
#
# Fails the build if the production AndroidManifest ever loses (or strips via
# tools:node="remove") android.permission.INTERNET. That permission is the
# Android relay RECEIVE path for the live-sync engine + the M7 background
# catch-up sweep; without it a release ships silently broken (the app launches
# but can never reach a relay). No test lane would catch this.
#
# Pure grep via scripts/ci/check_internet_permission.sh — no Flutter/Rust
# toolchain, so it is fast and independent of the build/test lanes.

name: Internet Permission Guard

on:
  workflow_call:

jobs:
  internet-permission-guard:
    name: Internet Permission Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check INTERNET permission is declared
        run: bash scripts/ci/check_internet_permission.sh
