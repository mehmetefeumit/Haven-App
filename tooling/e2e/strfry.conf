# strfry config for Haven E2E hermetic testing.
#
# Single-tenant, no auth, no rate limits — relay runs on localhost and is
# wiped between test runs. NEVER use this config in production.

db = "/var/lib/strfry/strfry-db"

dbParams {
    maxreaders = 256
    mapsize = 10737418240
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    # Kind-445 group messages are ephemeral. On a cold CI AVD the
    # publish->consume gap (boot + Gradle + onboarding settle + MLS
    # convergence) can run long, and the inner E2E test self-bounds at
    # 12 minutes (720 s, see e2e_combined.dart `_outerTestTimeout`).
    # These two ephemeral knobs MUST sit comfortably above that budget,
    # otherwise the relay rejects-as-too-old (rejectEphemeralEventsOlder*)
    # or garbage-collects (ephemeralEventsLifetime*) the very events the
    # test is still polling for — a spurious flake, not a real failure.
    # 3600 s (1 h) is well above the 720 s budget with ample slack while
    # staying finite (this is a single-tenant hermetic relay wiped per
    # run; an unbounded lifetime is unnecessary and would let stale
    # ephemerals linger if the data dir were ever reused).
    rejectEphemeralEventsOlderThanSeconds = 3600
    ephemeralEventsLifetimeSeconds = 3600
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    # 0 = leave the inherited NOFILES rlimit alone. The dockurr/strfry
    # container on GitHub-hosted runners caps the hard limit at 65536,
    # so any non-zero value above that aborts startup. The hermetic
    # E2E relay only handles a couple dozen sockets per scenario, so
    # the default soft limit is sufficient.
    nofiles = 0
    realIpHeader = ""

    info {
        name = "haven-e2e-strfry"
        description = "Hermetic Nostr relay for Haven E2E tests (localhost only)"
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 1
        reqWorker = 1
        reqMonitor = 1
        negentropy = 1
    }

    negentropy {
        enabled = false
        maxSyncEvents = 1000000
    }
}
